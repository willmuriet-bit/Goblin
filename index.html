<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détection Aimant (Orientation)</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:40px;
}

#value{
    font-size:40px;
    margin:30px 0;
}

#status{
    font-size:28px;
    font-weight:bold;
}
button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:lime;
    color:black;
}
</style>
</head>

<body>

<h1>🧲 Détecteur d'Aimant</h1>

<div id="value">0°</div>
<div id="status">En attente...</div>

<button onclick="start()">Activer</button>

<script>

let lastAlpha = null;
let instability = 0;

function start(){

    if (window.DeviceOrientationEvent) {

        window.addEventListener("deviceorientation", function(event){

            let alpha = event.alpha; // direction

            document.getElementById("value").innerText = alpha.toFixed(1) + "°";

            if(lastAlpha !== null){
                let diff = Math.abs(alpha - lastAlpha);

                if(diff > 20){ // variation brutale
                    instability++;

                    if(instability > 3){
                        document.getElementById("status").innerText = "🧲 AIMANT PROBABLE";
                        document.getElementById("status").style.color = "red";
                        navigator.vibrate(200);
                    }
                }else{
                    instability = 0;
                    document.getElementById("status").innerText = "Stable";
                    document.getElementById("status").style.color = "lime";
                }
            }

            lastAlpha = alpha;

        });

    } else {
        alert("Orientation non supportée");
    }
}

</script>

</body>
</html>
