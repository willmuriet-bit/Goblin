<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pad Interactif Pro</title>
    <style>
        /* --- STYLE GLOBAL --- */
        :root {
            --primary: #333;
            --accent: #007bff;
            --bg: #ffffff;
            --border-flash: #ff0000;
            --danger: #dc3545;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* IMPORTANT pour le tactile */
        }

        /* --- GESTION DES VUES --- */
        .view {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            background: white;
            z-index: 10;
        }

        .view.active {
            display: flex;
        }

        /* --- BOUTONS --- */
        button {            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2rem;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            cursor: pointer;
            border-radius: 8px;
            min-width: 200px;
            transition: all 0.2s;
            z-index: 100; /* Boutons au-dessus de tout */
        }

        button:active {
            background: var(--primary);
            color: white;
        }

        button.small {
            padding: 10px 20px;
            font-size: 1rem;
            min-width: auto;
        }

        button.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        button.danger:active {
            background: var(--danger);
            color: white;
        }

        /* --- CANVAS --- */
        canvas {
            touch-action: none;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        /* --- GRILLE DES ZONES (INVISIBLE) --- */
        .zone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            pointer-events: none;
            z-index: 20;
        }

        .zone-cell {
            /* Aucun effet visuel */
        }

        .zone-overlay.active {
            pointer-events: auto;
        }

        /* --- EFFET BORDURE --- */
        body.flash-border {
            border: 10px solid var(--border-flash);
            box-sizing: border-box;
            transition: border 0.1s;
        }

        /* --- OUTILS DE DESSIN --- */
        .toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #ccc;
            cursor: pointer;
        }
        .color-btn.selected {
            border-color: #000;
            transform: scale(1.2);        }

        /* --- INDICATEUR DE MODE --- */
        #mode-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 10px;
            background: #eee;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 100;
        }

        /* --- LISTE DES LISTES --- */
        .list-grid {
            display: flex;
            flex-direction: column;
            width: 80%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
        }

        .zone-editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 90%;
            max-width: 600px;
            z-index: 100;
        }

    </style>
</head>
<body>

    <!-- INDICATEUR DE MODE -->
    <div id="mode-indicator">Mode: DESSIN</div>

    <!-- VUE 1: ACCUEIL -->
    <div id="view-home" class="view active">
        <h1>PAD INTERACTIF</h1>
        <button onclick="app.navigate('view-list-selector-perf')">PERFORMER</button>
        <button onclick="app.navigate('view-list-manager')">LISTE DES DESSINS</button>
    </div>

    <!-- VUE 2: GESTION DES LISTES -->
    <div id="view-list-manager" class="view">        <h2>Mes Listes</h2>
        <div class="list-grid" id="manager-list-container"></div>
        <button class="small" onclick="app.addNewList()">+ Ajouter une liste</button>
        <button class="small" onclick="app.navigate('view-home')">Retour</button>
    </div>

    <!-- VUE 3: DÉTAIL D'UNE LISTE -->
    <div id="view-list-detail" class="view">
        <h2 id="detail-list-title">Liste X</h2>
        <button class="small" onclick="app.renameCurrentList()">Renommer la liste</button>
        <div class="zone-editor-grid" id="detail-zone-container"></div>
        <button class="small danger" onclick="app.deleteCurrentList()">🗑️ Supprimer la liste</button>
        <button class="small" onclick="app.navigate('view-list-manager')">Retour aux listes</button>
    </div>

    <!-- VUE 4: SÉLECTION DE LISTE POUR PERFORMANCE -->
    <div id="view-list-selector-perf" class="view">
        <h2>Choisir une liste pour Performer</h2>
        <div class="list-grid" id="perf-list-container"></div>
        <button class="small" onclick="app.navigate('view-home')">Annuler</button>
    </div>

    <!-- VUE 5: ÉDITEUR DE DESSIN -->
    <div id="view-draw-editor" class="view">
        <h3 id="editor-title">Dessin Zone X</h3>
        <canvas id="editor-canvas"></canvas>
        <div class="toolbar">
            <div class="color-btn selected" style="background:black" onclick="app.setColor('black', this)"></div>
            <div class="color-btn" style="background:red" onclick="app.setColor('red', this)"></div>
            <div class="color-btn" style="background:blue" onclick="app.setColor('blue', this)"></div>
            <button class="small" onclick="app.clearCanvas('editor')">Effacer</button>
            <button class="small" onclick="app.saveZoneDrawing()">Valider & Sauvegarder</button>
            <button class="small" onclick="app.navigate('view-list-detail')">Annuler</button>
        </div>
    </div>

    <!-- VUE 6: PERFORMANCE -->
    <div id="view-performance" class="view">
        <canvas id="perf-canvas"></canvas>
        <div class="zone-overlay" id="perf-zone-overlay"></div>
        
        <div class="toolbar">
            <div class="color-btn selected" style="background:black" onclick="app.setColor('black', this)"></div>
            <div class="color-btn" style="background:red" onclick="app.setColor('red', this)"></div>
            <div class="color-btn" style="background:blue" onclick="app.setColor('blue', this)"></div>
            <button class="small" onclick="app.clearCanvas('perf')">Effacer</button>
            <button class="small" onclick="app.navigate('view-home')">Quitter</button>
        </div>
        <div style="position:absolute; top:10px; left:10px; font-size:0.8rem; color:#888; z-index:100;">
            Appui long (700ms) pour changer de mode        </div>
    </div>

    <script>
        const app = {
            data: { lists: [] },
            state: {
                currentView: 'view-home',
                currentListId: null,
                currentZoneIndex: null,
                isZoneMode: false,
                color: 'black',
                longPressTimer: null
            },
            elements: {
                perfCanvas: null,
                perfCtx: null,
                editorCanvas: null,
                editorCtx: null,
                perfOverlay: null,
                modeIndicator: null
            },

            init: function() {
                // Récupération des éléments DOM
                this.elements.perfCanvas = document.getElementById('perf-canvas');
                this.elements.editorCanvas = document.getElementById('editor-canvas');
                this.elements.perfOverlay = document.getElementById('perf-zone-overlay');
                this.elements.modeIndicator = document.getElementById('mode-indicator');

                // Charger les données
                const stored = localStorage.getItem('padApp_data');
                if (stored) {
                    this.data.lists = JSON.parse(stored);
                } else {
                    this.data.lists = [{ id: Date.now(), name: "Liste 1", zones: Array(8).fill(null) }];
                    this.saveData();
                }

                // Init Canvas
                this.resizeCanvas(this.elements.perfCanvas);
                this.resizeCanvas(this.elements.editorCanvas);
                this.elements.perfCtx = this.elements.perfCanvas.getContext('2d');
                this.elements.editorCtx = this.elements.editorCanvas.getContext('2d');

                // Init Overlay Zones
                this.initZoneOverlay();

                // Resize listener
                window.addEventListener('resize', () => {                    this.resizeCanvas(this.elements.perfCanvas);
                    this.resizeCanvas(this.elements.editorCanvas);
                });

                this.renderListManager();
                console.log("✅ Application initialisée");
            },

            saveData: function() {
                localStorage.setItem('padApp_data', JSON.stringify(this.data.lists));
            },

            navigate: function(viewId) {
                document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                this.state.currentView = viewId;
                console.log("📍 Navigation vers:", viewId);

                if (viewId === 'view-list-manager') this.renderListManager();
                if (viewId === 'view-list-selector-perf') this.renderPerfSelector();
                if (viewId === 'view-performance') this.setupPerformanceMode();
            },

            renderListManager: function() {
                const container = document.getElementById('manager-list-container');
                container.innerHTML = '';
                this.data.lists.forEach(list => {
                    const btn = document.createElement('button');
                    btn.innerText = list.name;
                    btn.onclick = () => {
                        this.state.currentListId = list.id;
                        this.renderListDetail();
                        this.navigate('view-list-detail');
                    };
                    container.appendChild(btn);
                });
            },

            addNewList: function() {
                const newId = Date.now();
                this.data.lists.push({ id: newId, name: `Liste ${this.data.lists.length + 1}`, zones: Array(8).fill(null) });
                this.saveData();
                this.renderListManager();
            },

            renderListDetail: function() {
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                document.getElementById('detail-list-title').innerText = list.name;
                const container = document.getElementById('detail-zone-container');
                container.innerHTML = '';                
                for (let i = 0; i < 8; i++) {
                    const btn = document.createElement('button');
                    btn.innerText = `Zone ${i + 1}`;
                    btn.onclick = () => {
                        this.state.currentZoneIndex = i;
                        this.prepareEditor(`Zone ${i + 1}`);
                        this.navigate('view-draw-editor');
                    };
                    container.appendChild(btn);
                }
            },

            deleteCurrentList: function() {
                if (this.data.lists.length <= 1) {
                    alert("Impossible de supprimer la dernière liste !");
                    return;
                }
                if (confirm("Supprimer cette liste ?")) {
                    this.data.lists = this.data.lists.filter(l => l.id !== this.state.currentListId);
                    this.saveData();
                    this.navigate('view-list-manager');
                }
            },

            renameCurrentList: function() {
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                const newName = prompt("Nouveau nom :", list.name);
                if (newName) {
                    list.name = newName;
                    this.saveData();
                    this.renderListDetail();
                }
            },

            renderPerfSelector: function() {
                const container = document.getElementById('perf-list-container');
                container.innerHTML = '';
                this.data.lists.forEach(list => {
                    const btn = document.createElement('button');
                    btn.innerText = list.name;
                    btn.onclick = () => {
                        this.state.currentListId = list.id;
                        this.navigate('view-performance');
                    };
                    container.appendChild(btn);
                });
            },

            prepareEditor: function(title) {                document.getElementById('editor-title').innerText = title;
                const ctx = this.elements.editorCtx;
                ctx.clearRect(0, 0, this.elements.editorCanvas.width, this.elements.editorCanvas.height);
                
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                if (list && list.zones[this.state.currentZoneIndex]) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = list.zones[this.state.currentZoneIndex];
                }
                
                // IMPORTANT: Réinitialiser les listeners avant d'ajouter
                this.elements.editorCanvas.onmousedown = null;
                this.elements.editorCanvas.ontouchstart = null;
                
                this.setupDrawingMode(this.elements.editorCanvas, this.elements.editorCtx);
            },

            saveZoneDrawing: function() {
                const dataURL = this.elements.editorCanvas.toDataURL();
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                list.zones[this.state.currentZoneIndex] = dataURL;
                this.saveData();
                this.navigate('view-list-detail');
            },

            setupPerformanceMode: function() {
                const ctx = this.elements.perfCtx;
                ctx.clearRect(0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                this.state.isZoneMode = false;
                this.updateModeIndicator();
                
                // IMPORTANT: Réinitialiser les listeners
                this.elements.perfCanvas.onmousedown = null;
                this.elements.perfCanvas.ontouchstart = null;
                
                this.setupDrawingMode(this.elements.perfCanvas, this.elements.perfCtx, true);
            },

            initZoneOverlay: function() {
                this.elements.perfOverlay.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'zone-cell';
                    cell.dataset.index = i;
                    
                    // Réponse INSTANTANÉE (touchstart/mousedown, PAS click)
                    cell.addEventListener('touchstart', (e) => {
                        if (this.state.isZoneMode) {
                            e.preventDefault();                            e.stopPropagation();
                            this.loadZoneImage(i);
                        }
                    }, { passive: false });
                    
                    cell.addEventListener('mousedown', (e) => {
                        if (this.state.isZoneMode) {
                            e.preventDefault();
                            e.stopPropagation();
                            this.loadZoneImage(i);
                        }
                    });
                    
                    this.elements.perfOverlay.appendChild(cell);
                }
            },

            loadZoneImage: function(index) {
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                if (list && list.zones[index]) {
                    const ctx = this.elements.perfCtx;
                    const img = new Image();
                    img.onload = () => {
                        ctx.clearRect(0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                        ctx.drawImage(img, 0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                    };
                    img.src = list.zones[index];
                }
            },

            updateModeIndicator: function() {
                this.state.isZoneMode = !this.state.isZoneMode;
                this.elements.modeIndicator.innerText = this.state.isZoneMode ? "Mode: ZONES" : "Mode: DESSIN";
                this.elements.modeIndicator.style.background = this.state.isZoneMode ? "#ffcccc" : "#eee";
                
                if (this.state.isZoneMode) {
                    this.elements.perfOverlay.classList.add('active');
                    this.elements.perfCanvas.style.pointerEvents = 'none';
                } else {
                    this.elements.perfOverlay.classList.remove('active');
                    this.elements.perfCanvas.style.pointerEvents = 'auto';
                }

                // Effet Bordure (1 seconde)
                document.body.classList.add('flash-border');
                setTimeout(() => {
                    document.body.classList.remove('flash-border');
                }, 1000);
                
                console.log("🔄 Mode:", this.state.isZoneMode ? "ZONES" : "DESSIN");            },

            // --- MOTEUR DE DESSIN CORRIGÉ ---
            setupDrawingMode: function(canvas, ctx, isPerformance = false) {
                let isDrawing = false;
                let pressTimer = null;
                let startX = 0;
                let startY = 0;
                let hasMoved = false;

                // Fonction pour obtenir les coordonnées correctes
                const getCoords = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    if (e.touches && e.touches.length > 0) {
                        return {
                            x: e.touches[0].clientX - rect.left,
                            y: e.touches[0].clientY - rect.top
                        };
                    }
                    return {
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top
                    };
                };

                const startDraw = (e) => {
                    e.preventDefault();
                    isDrawing = true;
                    hasMoved = false;
                    const coords = getCoords(e);
                    startX = coords.x;
                    startY = coords.y;
                    
                    ctx.beginPath();
                    ctx.moveTo(coords.x, coords.y);
                    ctx.lineWidth = 5;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = this.state.color;
                    
                    // Long press UNIQUEMENT en mode performance
                    if (isPerformance) {
                        console.log("⏱️ Timer long press démarré");
                        pressTimer = setTimeout(() => {
                            console.log("⏱️ Timer écoulé (700ms)");
                            if (!hasMoved && isDrawing) {
                                console.log("✅ Long press détecté !");
                                this.updateModeIndicator();
                            }
                        }, 700);
                    }                };

                const draw = (e) => {
                    if (!isDrawing) return;
                    e.preventDefault();
                    
                    const coords = getCoords(e);
                    
                    // Détecter si on a bougé
                    const dist = Math.sqrt(Math.pow(coords.x - startX, 2) + Math.pow(coords.y - startY, 2));
                    if (dist > 10) {
                        hasMoved = true;
                        if (pressTimer) {
                            clearTimeout(pressTimer);
                            pressTimer = null;
                        }
                    }

                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                };

                const endDraw = (e) => {
                    isDrawing = false;
                    if (pressTimer) {
                        clearTimeout(pressTimer);
                        pressTimer = null;
                    }
                    ctx.beginPath();
                };

                // --- ÉVÉNEMENTS SOURIS ---
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);

                // --- ÉVÉNEMENTS TACTILES ---
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', endDraw);
                canvas.addEventListener('touchcancel', endDraw);

                console.log("🎨 Canvas listeners activés");
            },

            resizeCanvas: function(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            },            
            setColor: function(color, btnElement) {
                this.state.color = color;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btnElement.classList.add('selected');
            },

            clearCanvas: function(type) {
                if (confirm("Effacer tout le dessin ?")) {
                    const ctx = type === 'perf' ? this.elements.perfCtx : this.elements.editorCtx;
                    const canvas = type === 'perf' ? this.elements.perfCanvas : this.elements.editorCanvas;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
        };

        // Démarrage
        window.onload = function() {
            app.init();
        };

    </script>
</body>
</html>
