<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation avec Verrouillage Intelligent</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;            font-weight: bold;
        }

        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .test-btn {
            background-color: #28a745;
            color: white;
            margin: 5px auto;
        }

        .test-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 20px;
        }

        .line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #555;
            padding-left: 10px;
        }

        .highlight {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
        }

        .locked {
            color: #ff0;
            font-weight: bold;
        }

        .unlocked {
            color: #0f0;
            font-weight: bold;        }

        .permanently-locked {
            color: #f00;
            font-weight: bold;
        }

        .grace-period {
            color: #0ff;
            font-weight: bold;
        }

        #lock-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 165, 0, 0.9);
            color: black;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            display: none;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #lock-indicator.active {
            display: block;
            animation: pulse 1s infinite;
        }

        #lock-indicator.permanent {
            background-color: rgba(255, 0, 0, 0.9);
            color: white;
            animation: none;
        }

        #lock-indicator.grace {
            background-color: rgba(0, 255, 255, 0.9);
            color: black;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-bar {            width: 100%;
            height: 5px;
            background-color: #333;
            margin-top: 10px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #ff9500;
            width: 100%;
            transition: width 0.1s linear;
        }

        #alpha-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background-color: #333;
            border-radius: 10px;
        }

        .alpha-positive {
            color: #ff6b6b;
        }

        .alpha-negative {
            color: #4ecdc4;
        }

        .alpha-zero {
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div id="lock-indicator">
        🔒 VERROUILLÉ<br>
        <small id="countdown">10s</small>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <button id="btn-permission">🔓 Activer Capteurs</button>
    <div id="image-container">
        <!-- IMAGES FIXES - Ne changent jamais -->
        <img id="img-a" class="my-image show" src="https://picsum.photos/seed/fleur123/300/300" alt="Image A - Fleur">
        <img id="img-b" class="my-image" src="https://picsum.photos/seed/montagne456/300/300" alt="Image B - Montagne">
        <img id="img-c" class="my-image" src="https://picsum.photos/seed/ocean789/300/300" alt="Image C - Océan">
    </div>

    <div id="alpha-display">
        📐 Alpha: <span id="alpha-value" class="alpha-zero">0°</span>
    </div>

    <button class="test-btn" id="btn-a" onclick="manualShow('A')">🔵 Afficher Image A (Fleur)</button>
    <button class="test-btn" id="btn-b" onclick="manualShow('B')">🟢 Afficher Image B (Montagne)</button>
    <button class="test-btn" id="btn-c" onclick="manualShow('C')">🔴 Afficher Image C (Océan)</button>

    <div id="debug">
        <div class="line">Statut capteurs: <span id="status">En attente</span></div>
        <div class="line">État: <span id="lock-status" class="unlocked">🔓 DÉVERROUILLÉ</span></div>
        <div class="line">Alpha brut: <span id="alpha-raw">-</span>°</div>
        <div class="line">Alpha relatif: <span id="alpha-relative" class="highlight">0°</span></div>
        <div class="line">Image active: <span id="current-img" class="highlight">A</span></div>
        <div class="line">Mode: <span id="mode">Clique sur un bouton pour commencer</span></div>
        <div class="line">Seuil: <span id="threshold">±30°</span></div>
    </div>

    <script>
        let sensorsActive = false;
        let isLocked = false;
        let isPermanentlyLocked = false;
        let isGracePeriod = false;
        let lockTimeout = null;
        let countdownInterval = null;
        let graceTimeout = null;
        
        // NOUVEAU: Référence alpha pour calcul relatif
        let alphaReference = 0;
        let alphaRelative = 0;
        
        const LOCK_DURATION = 10000;
        const GRACE_DURATION = 2000;
        const ROTATION_THRESHOLD = 30; // Seuil de 30°

        function lockRotations(temporary = true) {
            isLocked = true;
            isPermanentlyLocked = !temporary;
            isGracePeriod = false;
            
            const lockIndicator = document.getElementById('lock-indicator');
            
            lockIndicator.classList.add('active');            lockIndicator.classList.remove('permanent', 'grace');
            
            if (isPermanentlyLocked) {
                lockIndicator.classList.add('permanent');
                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small>Définitivement</small>';
                document.getElementById('lock-status').textContent = '🔒 VERROUILLÉ (PERMANENT)';
                document.getElementById('lock-status').className = 'permanently-locked';
                document.getElementById('mode').textContent = 'Rotations désactivées';
            } else {
                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small id="countdown">10s</small><div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>';
                document.getElementById('lock-status').textContent = '🔒 VERROUILLÉ';
                document.getElementById('lock-status').className = 'locked';
                document.getElementById('mode').textContent = 'Attente 10s...';
                
                let remaining = 10;
                const countdownEl = document.getElementById('countdown');
                const progressFill = document.getElementById('progress-fill');
                countdownEl.textContent = remaining + 's';
                progressFill.style.width = '100%';
                
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    remaining -= 0.1;
                    const seconds = Math.ceil(remaining);
                    countdownEl.textContent = seconds + 's';
                    progressFill.style.width = (remaining / 10 * 100) + '%';
                }, 100);
                
                if (lockTimeout) clearTimeout(lockTimeout);
                lockTimeout = setTimeout(() => {
                    startGracePeriod();
                    if (countdownInterval) clearInterval(countdownInterval);
                }, LOCK_DURATION);
            }
            
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        function startGracePeriod() {
            isLocked = true;
            isGracePeriod = true;
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.remove('permanent');
            lockIndicator.classList.add('grace');
            lockIndicator.innerHTML = '⏳ PRÉPARATION...<br><small id="grace-countdown">2s</small>';
            
            document.getElementById('lock-status').textContent = '⏳ PÉRIODE DE GRÂCE';            document.getElementById('lock-status').className = 'grace-period';
            document.getElementById('mode').textContent = 'Préparation des capteurs...';
            
            let graceRemaining = 2;
            const graceCountdownEl = document.getElementById('grace-countdown');
            graceCountdownEl.textContent = graceRemaining + 's';
            
            if (graceTimeout) clearTimeout(graceTimeout);
            graceTimeout = setTimeout(() => {
                endGracePeriod();
            }, GRACE_DURATION);
        }

        // NOUVELLE FONCTION: Fin de période de grâce - Réinitialisation alpha
        function endGracePeriod() {
            // Capturer la position actuelle comme référence (0°)
            alphaReference = getCurrentAlpha();
            alphaRelative = 0;
            
            console.log('🎯 Référence alpha définie à:', alphaReference);
            
            unlockRotations();
        }

        function getCurrentAlpha() {
            // Cette fonction sera mise à jour par l'événement deviceorientation
            return window.currentAlpha || 0;
        }

        function unlockRotations() {
            isLocked = false;
            isPermanentlyLocked = false;
            isGracePeriod = false;
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.remove('active', 'permanent', 'grace');
            
            document.getElementById('lock-status').textContent = '🔓 DÉVERROUILLÉ (tourne ton téléphone!)';
            document.getElementById('lock-status').className = 'unlocked';
            document.getElementById('mode').textContent = 'Rotation ACTIVE - ±30° = changement d\'image';
            
            // Réinitialiser l'affichage alpha à 0
            updateAlphaDisplay(0);
            
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        function manualShow(letter) {            console.log('👤 Manuel: affichage image', letter);
            
            document.querySelectorAll('.my-image').forEach(img => {
                img.classList.remove('show');
            });
            
            const targetImg = document.getElementById('img-' + letter.toLowerCase());
            if (targetImg) {
                targetImg.classList.add('show');
                document.getElementById('current-img').textContent = letter;
            }
            
            lockRotations(true);
        }

        function updateAlphaDisplay(relativeAlpha) {
            const alphaValue = document.getElementById('alpha-value');
            alphaValue.textContent = Math.round(relativeAlpha) + '°';
            
            // Changer la couleur selon la valeur
            alphaValue.classList.remove('alpha-positive', 'alpha-negative', 'alpha-zero');
            if (relativeAlpha > 0) {
                alphaValue.classList.add('alpha-positive');
            } else if (relativeAlpha < 0) {
                alphaValue.classList.add('alpha-negative');
            } else {
                alphaValue.classList.add('alpha-zero');
            }
        }

        document.getElementById('btn-permission').addEventListener('click', async function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        activateSensors();
                    } else {
                        alert('Permission refusée');
                    }
                } catch (e) {
                    alert('Erreur: ' + e.message);
                }
            } else {
                activateSensors();
            }
        });

        function activateSensors() {
            sensorsActive = true;            document.getElementById('status').textContent = '✅ ACTIF';
            document.getElementById('status').style.color = '#00ff00';
            document.getElementById('btn-permission').style.display = 'none';
            document.getElementById('mode').textContent = 'Clique sur un bouton (A, B ou C) pour commencer';
            
            window.addEventListener('deviceorientation', function(event) {
                // Stocker l'alpha brut pour référence
                window.currentAlpha = event.alpha || 0;
                
                // Afficher alpha brut
                document.getElementById('alpha-raw').textContent = Math.round(window.currentAlpha);

                // SI VERROUILLÉ, on ignore
                if (isLocked) {
                    return;
                }

                // Si aucun bouton n'a été cliqué encore, on ne fait rien
                if (document.getElementById('mode').textContent.includes('Clique sur un bouton')) {
                    return;
                }

                // Calculer l'alpha RELATIF par rapport à la référence
                let rawAlpha = event.alpha || 0;
                alphaRelative = rawAlpha - alphaReference;
                
                // Normaliser entre -180 et 180
                if (alphaRelative > 180) {
                    alphaRelative = alphaRelative - 360;
                } else if (alphaRelative < -180) {
                    alphaRelative = alphaRelative + 360;
                }
                
                // Afficher les valeurs
                document.getElementById('alpha-relative').textContent = Math.round(alphaRelative) + '°';
                updateAlphaDisplay(alphaRelative);

                // Déterminer l'image selon le seuil de 30°
                let targetImage = 'A';

                if (alphaRelative > ROTATION_THRESHOLD) {
                    // Plus de 30° vers la DROITE → Image C
                    targetImage = 'C';
                } else if (alphaRelative < -ROTATION_THRESHOLD) {
                    // Plus de 30° vers la GAUCHE → Image B
                    targetImage = 'B';
                } else {
                    // Entre -30° et +30° → Image A
                    targetImage = 'A';
                }
                // Changer l'image seulement si différent
                const currentDisplayed = document.getElementById('current-img').textContent;
                if (currentDisplayed !== targetImage) {
                    console.log('🔄 Rotation détectée: passage de', currentDisplayed, 'à', targetImage, '(alpha:', Math.round(alphaRelative) + '°)');
                    
                    document.querySelectorAll('.my-image').forEach(img => {
                        img.classList.remove('show');
                    });
                    
                    const newImg = document.getElementById('img-' + targetImage.toLowerCase());
                    if (newImg) {
                        newImg.classList.add('show');
                        document.getElementById('current-img').textContent = targetImage;
                        
                        // VERROUILLER DÉFINITIVEMENT après le premier changement
                        lockRotations(false);
                    }
                }
            });
        }

        console.log('📱 Page chargée - Prêt!');
    </script>
</body>
</html>
