<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation Alpha + Beta</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;            font-weight: bold;
        }

        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .test-btn {
            background-color: #28a745;
            color: white;
            margin: 5px auto;
        }

        .test-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 20px;
        }

        .line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #555;
            padding-left: 10px;
        }

        .highlight {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
        }

        .locked { color: #ff0; font-weight: bold; }
        .unlocked { color: #0f0; font-weight: bold; }
        .permanently-locked { color: #f00; font-weight: bold; }

        #lock-indicator {
            position: fixed;
            top: 10px;
            right: 10px;            background-color: rgba(255, 165, 0, 0.9);
            color: black;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            display: none;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #lock-indicator.active { display: block; animation: pulse 1s infinite; }
        #lock-indicator.permanent { background-color: rgba(255, 0, 0, 0.9); color: white; animation: none; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: #333;
            margin-top: 10px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #ff9500;
            width: 100%;
            transition: width 0.1s linear;
        }

        .counters-container {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }

        .counter-box {
            background-color: #333;
            border-radius: 10px;
            padding: 15px;
            min-width: 120px;
            text-align: center;
        }

        .counter-title {            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .counter-value {
            font-size: 28px;
            font-weight: bold;
        }

        .alpha-positive { color: #ff6b6b; }
        .alpha-negative { color: #4ecdc4; }
        .alpha-zero { color: #00ff00; }
        
        .beta-positive { color: #ff9ff3; }
        .beta-negative { color: #54a0ff; }
        .beta-zero { color: #00ff00; }

        .threshold-info {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background-color: #2a2a2a;
            border-radius: 10px;
        }

        .threshold-info span { color: #ffd93d; font-weight: bold; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
            text-align: center;
        }

        .image-grid-item {
            padding: 10px;
            background-color: #333;
            border-radius: 10px;
            font-size: 12px;
        }

        .image-grid-item.active {
            background-color: #007bff;
            border: 2px solid #00ff00;
        }
    </style>
</head><body>

    <div id="lock-indicator">
        🔒 VERROUILLÉ<br>
        <small id="countdown">10s</small>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <button id="btn-permission">🔓 Activer Capteurs</button>

    <div id="image-container">
        <img id="img-a" class="my-image show" src="https://picsum.photos/seed/fleur123/300/300" alt="A">
        <img id="img-b" class="my-image" src="https://picsum.photos/seed/montagne456/300/300" alt="B">
        <img id="img-c" class="my-image" src="https://picsum.photos/seed/ocean789/300/300" alt="C">
        <img id="img-d" class="my-image" src="https://picsum.photos/seed/soleil111/300/300" alt="D">
        <img id="img-e" class="my-image" src="https://picsum.photos/seed/lune222/300/300" alt="E">
    </div>

    <div class="image-grid">
        <div class="image-grid-item" id="grid-b">B ← Gauche</div>
        <div class="image-grid-item active" id="grid-a">A Centre</div>
        <div class="image-grid-item" id="grid-c">C → Droite</div>
        <div class="image-grid-item" id="grid-e">E ↓ Bas</div>
        <div class="image-grid-item" id="grid-d">D ↑ Haut</div>
    </div>

    <div class="counters-container">
        <div class="counter-box">
            <div class="counter-title">📐 ALPHA (Gauche/Droite)</div>
            <div id="alpha-value" class="counter-value alpha-zero">0°</div>
        </div>
        <div class="counter-box">
            <div class="counter-title">📏 BETA (Haut/Bas)</div>
            <div id="beta-value" class="counter-value beta-zero">0°</div>
        </div>
    </div>

    <div class="threshold-info">
        🎯 Seuil: <span>±15°</span> | Alpha: A/B/C | Beta: A/D/E
    </div>

    <button class="test-btn" id="btn-a" onclick="manualShow('A')">🔵 Image A</button>
    <button class="test-btn" id="btn-b" onclick="manualShow('B')">🟢 Image B</button>
    <button class="test-btn" id="btn-c" onclick="manualShow('C')">🔴 Image C</button>
    <button class="test-btn" id="btn-d" onclick="manualShow('D')">🟡 Image D</button>
    <button class="test-btn" id="btn-e" onclick="manualShow('E')">🟣 Image E</button>

    <div id="debug">        <div class="line">Statut: <span id="status">En attente</span></div>
        <div class="line">État: <span id="lock-status" class="unlocked">🔓 DÉVERROUILLÉ</span></div>
        <div class="line">Alpha: <span id="alpha-raw" class="highlight">0°</span></div>
        <div class="line">Beta: <span id="beta-raw" class="highlight">0°</span></div>
        <div class="line">Image: <span id="current-img" class="highlight">A</span></div>
        <div class="line">Mode: <span id="mode">Clique sur un bouton</span></div>
    </div>

    <script>
        let sensorsActive = false;
        let isLocked = false;
        let isPermanentlyLocked = false;
        let lockTimeout = null;
        let countdownInterval = null;
        
        // Références pour les deux axes
        let alphaReference = 0;
        let betaReference = 0;
        
        // Filtrage pour stabiliser (moyenne mobile)
        let alphaHistory = [];
        let betaHistory = [];
        const HISTORY_SIZE = 3;
        
        const LOCK_DURATION = 10000;
        const GRACE_DURATION = 2000;
        const THRESHOLD = 15;

        // Fonction pour lisser les valeurs
        function smoothValue(value, history) {
            history.push(value);
            if (history.length > HISTORY_SIZE) {
                history.shift();
            }
            return history.reduce((a, b) => a + b, 0) / history.length;
        }

        function lockRotations(temporary = true) {
            isLocked = true;
            isPermanentlyLocked = !temporary;
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.add('active');
            
            if (isPermanentlyLocked) {
                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small>Définitivement</small>';
                document.getElementById('lock-status').textContent = '🔒 VERROUILLÉ (PERMANENT)';
                document.getElementById('lock-status').className = 'permanently-locked';
                document.getElementById('mode').textContent = 'Rotations désactivées';
            } else {                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small id="countdown">10s</small><div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>';
                document.getElementById('lock-status').textContent = '🔒 VERROUILLÉ';
                document.getElementById('lock-status').className = 'locked';
                document.getElementById('mode').textContent = 'Attente 10s...';
                
                let remaining = 10;
                const countdownEl = document.getElementById('countdown');
                const progressFill = document.getElementById('progress-fill');
                countdownEl.textContent = remaining + 's';
                progressFill.style.width = '100%';
                
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    remaining -= 0.1;
                    countdownEl.textContent = Math.ceil(remaining) + 's';
                    progressFill.style.width = (remaining / 10 * 100) + '%';
                }, 100);
                
                if (lockTimeout) clearTimeout(lockTimeout);
                lockTimeout = setTimeout(() => {
                    unlockRotations();
                    if (countdownInterval) clearInterval(countdownInterval);
                }, LOCK_DURATION);
            }
            
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        function unlockRotations() {
            isLocked = false;
            isPermanentlyLocked = false;
            
            // IMPORTANT: Capturer les références DES DEUX axes en même temps
            alphaReference = window.lastAlpha || 0;
            betaReference = window.lastBeta || 0;
            
            console.log('🎯 Références capturées - Alpha:', alphaReference, '| Beta:', betaReference);
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.remove('active');
            
            document.getElementById('lock-status').textContent = '🔓 DÉVERROUILLÉ';
            document.getElementById('lock-status').className = 'unlocked';
            document.getElementById('mode').textContent = 'Bouge ton téléphone (Alpha + Beta actifs)';
            
            // Réinitialiser affichages
            updateDisplay(0, 0);
                        document.querySelectorAll('.test-btn').forEach(btn => {
                btn.disabled = false;
            });
            
            document.querySelectorAll('.image-grid-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById('grid-a').classList.add('active');
        }

        function updateDisplay(alpha, beta) {
            const alphaEl = document.getElementById('alpha-value');
            const betaEl = document.getElementById('beta-value');
            
            alphaEl.textContent = Math.round(alpha) + '°';
            betaEl.textContent = Math.round(beta) + '°';
            
            // Couleurs Alpha
            alphaEl.classList.remove('alpha-positive', 'alpha-negative', 'alpha-zero');
            if (alpha > 5) alphaEl.classList.add('alpha-positive');
            else if (alpha < -5) alphaEl.classList.add('alpha-negative');
            else alphaEl.classList.add('alpha-zero');
            
            // Couleurs Beta
            betaEl.classList.remove('beta-positive', 'beta-negative', 'beta-zero');
            if (beta > 5) betaEl.classList.add('beta-positive');
            else if (beta < -5) betaEl.classList.add('beta-negative');
            else betaEl.classList.add('beta-zero');
        }

        function updateGrid(image) {
            document.querySelectorAll('.image-grid-item').forEach(item => {
                item.classList.remove('active');
            });
            const activeItem = document.getElementById('grid-' + image.toLowerCase());
            if (activeItem) {
                activeItem.classList.add('active');
            }
        }

        function manualShow(letter) {
            console.log('👤 Manuel: Image', letter);
            
            document.querySelectorAll('.my-image').forEach(img => {
                img.classList.remove('show');
            });
            
            const targetImg = document.getElementById('img-' + letter.toLowerCase());
            if (targetImg) {
                targetImg.classList.add('show');                document.getElementById('current-img').textContent = letter;
            }
            
            updateGrid(letter);
            
            // Réinitialiser historiques
            alphaHistory = [];
            betaHistory = [];
            
            lockRotations(true);
        }

        document.getElementById('btn-permission').addEventListener('click', async function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        activateSensors();
                    } else {
                        alert('Permission refusée');
                    }
                } catch (e) {
                    alert('Erreur: ' + e.message);
                }
            } else {
                activateSensors();
            }
        });

        function activateSensors() {
            sensorsActive = true;
            document.getElementById('status').textContent = '✅ ACTIF';
            document.getElementById('status').style.color = '#00ff00';
            document.getElementById('btn-permission').style.display = 'none';
            document.getElementById('mode').textContent = 'Clique sur un bouton pour commencer';
            
            window.addEventListener('deviceorientation', function(event) {
                // Stocker les dernières valeurs brutes
                window.lastAlpha = event.alpha || 0;
                window.lastBeta = event.beta || 0;
                
                // Afficher valeurs brutes
                document.getElementById('alpha-raw').textContent = Math.round(window.lastAlpha);
                document.getElementById('beta-raw').textContent = Math.round(window.lastBeta);

                // SI VERROUILLÉ, on ignore tout
                if (isLocked) {
                    return;
                }
                // Si aucun bouton cliqué encore, on ne fait rien
                if (document.getElementById('mode').textContent.includes('Clique sur un bouton')) {
                    return;
                }

                // Lisser les valeurs
                const smoothAlpha = smoothValue(window.lastAlpha, alphaHistory);
                const smoothBeta = smoothValue(window.lastBeta, betaHistory);

                // Calculer les valeurs RELATIVES
                let alphaRelative = smoothAlpha - alphaReference;
                let betaRelative = smoothBeta - betaReference;
                
                // Normaliser alpha entre -180 et 180
                if (alphaRelative > 180) alphaRelative -= 360;
                if (alphaRelative < -180) alphaRelative += 360;

                // Afficher valeurs relatives
                updateDisplay(alphaRelative, betaRelative);

                // DÉTERMINER L'IMAGE - Les deux axes sont actifs !
                let targetImage = 'A';
                let reason = 'Centre';

                // Vérifier BETA en premier (inclinaison haut/bas)
                if (betaRelative > THRESHOLD) {
                    targetImage = 'D';
                    reason = 'Beta > +15° (HAUT)';
                } else if (betaRelative < -THRESHOLD) {
                    targetImage = 'E';
                    reason = 'Beta < -15° (BAS)';
                }
                // Sinon vérifier ALPHA (rotation gauche/droite)
                else if (alphaRelative > THRESHOLD) {
                    targetImage = 'C';
                    reason = 'Alpha > +15° (DROITE)';
                } else if (alphaRelative < -THRESHOLD) {
                    targetImage = 'B';
                    reason = 'Alpha < -15° (GAUCHE)';
                }

                // Changer l'image si différent
                const currentDisplayed = document.getElementById('current-img').textContent;
                if (currentDisplayed !== targetImage) {
                    console.log('🔄 Changement:', currentDisplayed, '→', targetImage, 
                        '| Alpha:', Math.round(alphaRelative) + '°', 
                        '| Beta:', Math.round(betaRelative) + '°',
                        '| Raison:', reason);
                                        document.querySelectorAll('.my-image').forEach(img => {
                        img.classList.remove('show');
                    });
                    
                    const newImg = document.getElementById('img-' + targetImage.toLowerCase());
                    if (newImg) {
                        newImg.classList.add('show');
                        document.getElementById('current-img').textContent = targetImage;
                        updateGrid(targetImage);
                        
                        // VERROUILLER DÉFINITIVEMENT
                        lockRotations(false);
                    }
                }
            });
        }

        console.log('📱 Page chargée - Alpha + Beta actifs !');
    </script>
</body>
</html>
