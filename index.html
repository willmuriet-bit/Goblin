<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zone Interactives</title>
    <style>
        /* 1. Fond blanc et suppression des marges par défaut */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            overflow: hidden; /* Empêche le défilement */
            font-family: Arial, sans-serif;
        }

        /* 2. Grille : 2 colonnes, 4 rangées */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 zones verticales */
            grid-template-rows: 1fr 1fr 1fr 1fr; /* 4 zones horizontales */
            width: 100vw;
            height: 100vh;
        }

        /* Style des zones invisibles */
        .zone {
            /* Pas de bordure, pas de fond (invisible) */
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Enlève le flash bleu sur mobile */
        }

        /* Le chiffre au centre */
        #display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem; /* Très gros chiffre */
            color: #333;
            pointer-events: none; /* Permet de cliquer "à travers" le chiffre */
            user-select: none;
            font-weight: bold;
            opacity: 0.2; /* Légèrement transparent pour ne pas gêner la vue */
            transition: opacity 0.1s;
        }

        /* Optionnel : Un petit effet visuel quand on touche (pour le debug) */        .zone:active {
            background-color: rgba(0,0,0,0.05); 
        }
    </style>
</head>
<body>

    <!-- Le chiffre qui s'affiche au centre -->
    <div id="display"></div>

    <!-- La grille de 8 zones -->
    <div class="grid-container">
        <!-- Les zones sont numérotées de 1 à 8 -->
        <div class="zone" data-number="1"></div>
        <div class="zone" data-number="2"></div>
        <div class="zone" data-number="3"></div>
        <div class="zone" data-number="4"></div>
        <div class="zone" data-number="5"></div>
        <div class="zone" data-number="6"></div>
        <div class="zone" data-number="7"></div>
        <div class="zone" data-number="8"></div>
    </div>

    <script>
        // Sélection de l'élément d'affichage
        const displayElement = document.getElementById('display');

        // Sélection de toutes les zones
        const zones = document.querySelectorAll('.zone');

        // Fonction pour afficher le chiffre
        function showNumber(number) {
            displayElement.innerText = number;
            displayElement.style.opacity = "1"; // Rend le chiffre bien visible
        }

        // Fonction pour cacher le chiffre (optionnel, quand on relâche)
        function hideNumber() {
            displayElement.style.opacity = "0.2"; // Retourne à l'état transparent
        }

        // On ajoute les écouteurs d'événements sur chaque zone
        zones.forEach(zone => {
            const number = zone.getAttribute('data-number');

            // Événement pour la souris (PC) : mousedown (appuyer sans relâcher)
            zone.addEventListener('mousedown', () => {
                showNumber(number);
            });
            // Événement pour le tactile (Mobile) : touchstart
            zone.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Empêche le zoom ou le scroll
                showNumber(number);
            });

            // Optionnel : Quand on relâche, on peut effacer ou diminuer l'opacité
            zone.addEventListener('mouseup', hideNumber);
            zone.addEventListener('touchend', hideNumber);
            zone.addEventListener('mouseleave', hideNumber); // Si la souris sort de la zone
        });
    </script>

</body>
</html>
