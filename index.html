<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation Magique</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        #image-container {
            width: 280px;
            height: 280px;
            border-radius: 15px;
            overflow: hidden;
            background-color: #333;
            margin: 20px auto;
            border: 3px solid #555;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        img.active {
            display: block;
        }

        #permission-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
        }

        #info {            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
        }

        .value {
            color: #00ff00;
            font-weight: bold;
        }

        .warning {
            color: #ffaa00;
        }

        .good {
            color: #00ff00;
        }

        #mode-toggle {
            display: block;
            margin: 10px auto;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="permission-btn">🔓 Activer les capteurs</button>
    <button id="mode-toggle" style="display:none;">🔄 Mode: Strict (à plat requis)</button>

    <div id="image-container">
        <img id="img-a" src="https://picsum.photos/300/300?random=1" class="active">
        <img id="img-b" src="https://picsum.photos/300/300?random=2">
        <img id="img-c" src="https://picsum.photos/300/300?random=3">
    </div>

    <div id="info">
        <div>📊 Valeurs des capteurs:</div>
        <div>Alpha (rotation): <span id="alpha" class="value">-</span>°</div>
        <div>Beta (inclinaison avant/arrière): <span id="beta" class="value">-</span>°</div>
        <div>Gamma (inclinaison gauche/droite): <span id="gamma" class="value">-</span>°</div>
        <br>        <div id="flat-status">📱 Téléphone: <span class="warning">VÉRIFICATION...</span></div>
        <div id="image-status">🖼️ Image affichée: <span class="value">A</span></div>
        <div id="zone-status">📍 Zone: <span class="value">-</span></div>
    </div>

    <script>
        const btn = document.getElementById('permission-btn');
        const modeToggle = document.getElementById('mode-toggle');
        
        const alphaSpan = document.getElementById('alpha');
        const betaSpan = document.getElementById('beta');
        const gammaSpan = document.getElementById('gamma');
        const flatStatus = document.getElementById('flat-status');
        const imageStatus = document.getElementById('image-status');
        const zoneStatus = document.getElementById('zone-status');

        const imgA = document.getElementById('img-a');
        const imgB = document.getElementById('img-b');
        const imgC = document.getElementById('img-c');

        let strictMode = true; // true = téléphone doit être à plat

        btn.addEventListener('click', async function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        startSensors();
                    } else {
                        alert('Permission refusée');
                    }
                } catch (e) {
                    alert('Erreur: ' + e);
                }
            } else {
                startSensors();
            }
        });

        modeToggle.addEventListener('click', function() {
            strictMode = !strictMode;
            modeToggle.textContent = strictMode ? 
                '🔄 Mode: Strict (à plat requis)' : 
                '🔄 Mode: Libre (rotation seule)';
            modeToggle.style.backgroundColor = strictMode ? '#28a745' : '#dc3545';
        });

        function startSensors() {
            btn.style.display = 'none';            modeToggle.style.display = 'block';
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            const alpha = event.alpha || 0;
            const beta = event.beta || 0;
            const gamma = event.gamma || 0;

            // Mise à jour affichage
            alphaSpan.textContent = Math.round(alpha);
            betaSpan.textContent = Math.round(beta);
            gammaSpan.textContent = Math.round(gamma);

            // Vérifier si téléphone à plat
            const isFlat = Math.abs(beta) < 45 && Math.abs(gamma) < 45;
            
            if (isFlat) {
                flatStatus.innerHTML = '📱 Téléphone: <span class="good">À PLAT ✅</span>';
            } else {
                flatStatus.innerHTML = '📱 Téléphone: <span class="warning">PAS À PLAT ⚠️</span><br><small>(Beta: ' + 
                    Math.round(beta) + '°, Gamma: ' + Math.round(gamma) + '°)</small>';
            }

            // Normaliser alpha entre -180 et 180
            let normalizedAlpha = alpha;
            if (normalizedAlpha > 180) {
                normalizedAlpha = normalizedAlpha - 360;
            }

            // Déterminer la zone
            let zone = '';
            let imageToShow = 'A';

            if (!strictMode || isFlat) {
                if (normalizedAlpha > -45 && normalizedAlpha < 45) {
                    zone = 'CENTRE (-45° à +45°)';
                    imageToShow = 'A';
                } else if (normalizedAlpha <= -45 && normalizedAlpha > -135) {
                    zone = 'GAUCHE (-45° à -135°)';
                    imageToShow = 'B';
                } else if (normalizedAlpha >= 45 && normalizedAlpha < 135) {
                    zone = 'DROITE (+45° à +135°)';
                    imageToShow = 'C';
                } else {
                    zone = 'ARRIÈRE (>135° ou <-135°)';
                    imageToShow = 'A';
                }

                // Changer l'image                showImage(imageToShow);
                imageStatus.innerHTML = '🖼️ Image affichée: <span class="value">' + imageToShow + '</span>';
                zoneStatus.innerHTML = '📍 Zone: <span class="value">' + zone + '</span>';
            } else {
                zoneStatus.innerHTML = '📍 Zone: <span class="warning">Attends que le téléphone soit à plat</span>';
            }
        }

        function showImage(letter) {
            imgA.classList.remove('active');
            imgB.classList.remove('active');
            imgC.classList.remove('active');

            if (letter === 'A') imgA.classList.add('active');
            if (letter === 'B') imgB.classList.add('active');
            if (letter === 'C') imgC.classList.add('active');
        }
    </script>
</body>
</html>
