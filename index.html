<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rotation</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            position: relative;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .test-btn {
            background-color: #28a745;
            color: white;
            margin: 5px auto;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 20px;
        }

        .line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #555;
            padding-left: 10px;
        }

        .highlight {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
        }

        .alert {
            color: #ff0;
        }
    </style>
</head>
<body>

    <button id="btn-permission">🔓 Activer Capteurs</button>

    <div id="image-container">
        <img id="img-a" class="my-image show" src="https://picsum.photos/300/300?random=1" alt="A">
        <img id="img-b" class="my-image" src="https://picsum.photos/300/300?random=2" alt="B">
        <img id="img-c" class="my-image" src="https://picsum.photos/300/300?random=3" alt="C">
    </div>

    <button class="test-btn" onclick="manualShow('A')">🔵 Afficher Image A</button>
    <button class="test-btn" onclick="manualShow('B')">🟢 Afficher Image B</button>    <button class="test-btn" onclick="manualShow('C')">🔴 Afficher Image C</button>

    <div id="debug">
        <div class="line">Statut: <span id="status">En attente</span></div>
        <div class="line">Alpha: <span id="alpha">-</span>°</div>
        <div class="line">Beta: <span id="beta">-</span>°</div>
        <div class="line">Gamma: <span id="gamma">-</span>°</div>
        <div class="line highlight">Image active: <span id="current-img">A</span></div>
        <div class="line">Zone détectée: <span id="zone">-</span></div>
        <div class="line alert" id="log"></div>
    </div>

    <script>
        let sensorsActive = false;
        const logDiv = document.getElementById('log');

        // TEST MANUEL - Pour vérifier que le changement d'image fonctionne
        function manualShow(letter) {
            console.log('Test manuel: affichage image', letter);
            logDiv.textContent = ' TEST MANUEL: Image ' + letter;
            
            // Cacher toutes les images
            document.querySelectorAll('.my-image').forEach(img => {
                img.classList.remove('show');
            });
            
            // Montrer la bonne
            const targetImg = document.getElementById('img-' + letter.toLowerCase());
            if (targetImg) {
                targetImg.classList.add('show');
                document.getElementById('current-img').textContent = letter;
                console.log('✅ Image', letter, 'affichée');
            } else {
                console.error('❌ Image', letter, 'non trouvée!');
            }
        }

        // Activation des capteurs
        document.getElementById('btn-permission').addEventListener('click', async function() {
            logDiv.textContent = '🔄 Activation...';
            
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        activateSensors();
                    } else {
                        logDiv.textContent = '❌ Permission refusée';
                    }                } catch (e) {
                    logDiv.textContent = '❌ Erreur: ' + e.message;
                }
            } else {
                activateSensors();
            }
        });

        function activateSensors() {
            sensorsActive = true;
            document.getElementById('status').textContent = '✅ ACTIF';
            document.getElementById('status').style.color = '#00ff00';
            document.getElementById('btn-permission').style.display = 'none';
            logDiv.textContent = '✅ Capteurs actifs! Tourne ton téléphone';
            
            window.addEventListener('deviceorientation', function(event) {
                const alpha = event.alpha || 0;
                const beta = event.beta || 0;
                const gamma = event.gamma || 0;

                // Afficher les valeurs
                document.getElementById('alpha').textContent = Math.round(alpha);
                document.getElementById('beta').textContent = Math.round(beta);
                document.getElementById('gamma').textContent = Math.round(gamma);

                // Normaliser alpha
                let normalizedAlpha = alpha;
                if (normalizedAlpha > 180) {
                    normalizedAlpha = normalizedAlpha - 360;
                }

                // Déterminer la zone
                let zone = '';
                let targetImage = 'A';

                // Zone très large pour tester
                if (normalizedAlpha >= -60 && normalizedAlpha < 60) {
                    zone = 'CENTRE (-60° à 60°)';
                    targetImage = 'A';
                } else if (normalizedAlpha >= 60 && normalizedAlpha < 150) {
                    zone = 'DROITE (60° à 150°)';
                    targetImage = 'C';
                } else if (normalizedAlpha >= 150 || normalizedAlpha < -150) {
                    zone = 'ARRIÈRE (>150° ou <-150°)';
                    targetImage = 'A';
                } else if (normalizedAlpha >= -150 && normalizedAlpha < -60) {
                    zone = 'GAUCHE (-150° à -60°)';
                    targetImage = 'B';
                }
                document.getElementById('zone').textContent = zone;

                // CHANGER L'IMAGE
                changeImage(targetImage);
            });
        }

        function changeImage(letter) {
            const currentDisplayed = document.getElementById('current-img').textContent;
            
            // Seulement changer si différent
            if (currentDisplayed !== letter) {
                console.log('🔄 Changement de', currentDisplayed, 'vers', letter);
                logDiv.textContent = '🔄 Changement: ' + currentDisplayed + ' → ' + letter;
                
                // Cacher tout
                document.querySelectorAll('.my-image').forEach(img => {
                    img.classList.remove('show');
                });
                
                // Afficher la nouvelle
                const newImg = document.getElementById('img-' + letter.toLowerCase());
                if (newImg) {
                    newImg.classList.add('show');
                    document.getElementById('current-img').textContent = letter;
                    console.log('✅ Image', letter, 'maintenant affichée');
                }
            }
        }

        // Test au chargement
        console.log('📱 Page chargée');
        console.log('Images trouvées:', {
            A: document.getElementById('img-a'),
            B: document.getElementById('img-b'),
            C: document.getElementById('img-c')
        });
    </script>
</body>
</html>
