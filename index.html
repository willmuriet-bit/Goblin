<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Corrigée - Beta + Verrouillage</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;            font-weight: bold;
        }

        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .test-btn {
            background-color: #28a745;
            color: white;
            margin: 5px auto;
        }

        .test-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .line {
            margin: 3px 0;
            padding: 3px;
            border-left: 2px solid #555;
            padding-left: 8px;
        }

        .highlight { color: #00ff00; font-weight: bold; }
        .warning { color: #ff0; font-weight: bold; }
        .error { color: #f00; font-weight: bold; }
        .locked { color: #ff0; font-weight: bold; }
        .unlocked { color: #0f0; font-weight: bold; }

        #lock-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 165, 0, 0.9);
            color: black;            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            display: none;
            z-index: 9999;
        }

        #lock-indicator.active { display: block; animation: pulse 1s infinite; }
        #lock-indicator.permanent { background-color: rgba(255, 0, 0, 0.9); color: white; animation: none; }
        #lock-indicator.starting { background-color: rgba(0, 255, 255, 0.9); color: black; animation: none; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: #333;
            margin-top: 10px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #ff9500;
            width: 100%;
            transition: width 0.1s linear;
        }

        .counters-container {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }

        .counter-box {
            background-color: #333;
            border-radius: 10px;
            padding: 15px;
            min-width: 130px;
            text-align: center;
        }

        .counter-box.invalid {
            border: 2px solid #ff0000;
            background-color: #3a1a1a;        }

        .counter-title {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .counter-value {
            font-size: 26px;
            font-weight: bold;
        }

        .gamma-positive { color: #ff6b6b; }
        .gamma-negative { color: #4ecdc4; }
        .gamma-zero { color: #00ff00; }
        
        .beta-positive { color: #ff9ff3; }
        .beta-negative { color: #54a0ff; }
        .beta-zero { color: #00ff00; }

        .status-box {
            background-color: #1a4a1a;
            border: 2px solid #00ff00;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            font-size: 16px;
        }

        .status-box.locked {
            background-color: #4a1a1a;
            border-color: #ff0000;
        }

        .info-box {
            background-color: #004a4a;
            border: 2px solid #00ffff;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            font-size: 14px;
        }

        .beta-warning {
            background-color: #4a1a1a;
            border: 2px solid #ff0000;
            color: #ff6b6b;            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .beta-warning.visible {
            display: block;
        }

        .thresholds-display {
            background-color: #2a1a3a;
            border: 2px solid #aa00ff;
            color: #dd88ff;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="lock-indicator">
        🔒 VERROUILLÉ<br>
        <small id="countdown">4s</small>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <button id="btn-permission">🔓 Activer Capteurs</button>

    <div class="info-box">
        📱 <strong>GAMMA</strong> (Gauche/Droite) + <strong>BETA</strong> (Haut/Bas)<br>
        🎯 1er changement = Verrouillage PERMANENT
    </div>

    <div class="thresholds-display">
        📐 <strong>GAMMA:</strong> +15° (C) | -15° (B)<br>
        📏 <strong>BETA:</strong> +15° (D) | -8° (E)
    </div>

    <div class="beta-warning" id="beta-warning">
        ⚠️ BETA INVALIDE IGNORÉE (valeur hors plage)
    </div>
    <div id="image-container">
        <img id="img-a" class="my-image show" src="https://picsum.photos/seed/fleur123/300/300" alt="A">
        <img id="img-b" class="my-image" src="https://picsum.photos/seed/montagne456/300/300" alt="B">
        <img id="img-c" class="my-image" src="https://picsum.photos/seed/ocean789/300/300" alt="C">
        <img id="img-d" class="my-image" src="https://picsum.photos/seed/soleil111/300/300" alt="D">
        <img id="img-e" class="my-image" src="https://picsum.photos/seed/lune222/300/300" alt="E">
    </div>

    <div class="status-box" id="status-box">
        🎯 <span id="main-status">Clique sur "Activer Capteurs"</span>
    </div>

    <div class="counters-container">
        <div class="counter-box" id="gamma-box">
            <div class="counter-title">📐 GAMMA</div>
            <div id="gamma-value" class="counter-value gamma-zero">0°</div>
            <div style="font-size: 11px; color: #888; margin-top: 5px;">Seuils: ±15°</div>
        </div>
        <div class="counter-box" id="beta-box">
            <div class="counter-title">📏 BETA</div>
            <div id="beta-value" class="counter-value beta-zero">0°</div>
            <div style="font-size: 11px; color: #888; margin-top: 5px;">Seuils: +15° / -8°</div>
        </div>
    </div>

    <button class="test-btn" id="btn-a" onclick="manualShow('A')">🔵 Image A</button>
    <button class="test-btn" id="btn-b" onclick="manualShow('B')">🟢 Image B</button>
    <button class="test-btn" id="btn-c" onclick="manualShow('C')">🔴 Image C</button>
    <button class="test-btn" id="btn-d" onclick="manualShow('D')">🟡 Image D</button>
    <button class="test-btn" id="btn-e" onclick="manualShow('E')">🟣 Image E</button>

    <div id="debug"></div>

    <script>
        let isLocked = false;
        let isPermanentlyLocked = false;
        let lockTimeout = null;
        let countdownInterval = null;
        
        let gammaRef = 0;
        let betaRef = 0;
        
        let gammaHist = [];
        let betaHist = [];
        const HIST_SIZE = 3;
        
        // SEUILS
        const GAMMA_THRESHOLD = 15;
        const BETA_THRESHOLD_POS = 15;
        const BETA_THRESHOLD_NEG = -8;        
        const STABILITY_TIME = 300;
        let stableStartTime = 0;
        let pendingZone = null;
        let lastValidBeta = 0;
        
        const LOCK_DURATION = 4000;

        function log(msg, type = 'info') {
            const debug = document.getElementById('debug');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `line ${type === 'error' ? 'error' : type === 'warning' ? 'warning' : type === 'success' ? 'highlight' : ''}`;
            entry.textContent = `[${time}] ${msg}`;
            debug.insertBefore(entry, debug.firstChild);
            while (debug.children.length > 30) debug.removeChild(debug.lastChild);
        }

        function smooth(value, hist) {
            hist.push(value);
            if (hist.length > HIST_SIZE) hist.shift();
            return hist.reduce((a, b) => a + b, 0) / hist.length;
        }

        function normalizeGamma(angle) {
            if (angle > 90) angle = 90;
            if (angle < -90) angle = -90;
            return angle;
        }

        // CORRECTION BETA: Ignore les valeurs hors plage normale
        function validateBeta(value) {
            // Beta normal est entre -90° et +90° pour un téléphone tenu normalement
            // Toute valeur en dehors est un saut de capteur
            if (value === null || value === undefined) {
                log('⚠️ Beta = null', 'warning');
                return lastValidBeta;
            }
            
            if (value < -90 || value > 90) {
                log(`⚠️ BETA INVALIDE: ${value}° (ignorée, garde ${lastValidBeta}°)`, 'warning');
                document.getElementById('beta-warning').classList.add('visible');
                document.getElementById('beta-box').classList.add('invalid');
                return lastValidBeta;
            }
            
            // Valeur valide
            document.getElementById('beta-warning').classList.remove('visible');
            document.getElementById('beta-box').classList.remove('invalid');
            lastValidBeta = value;            return value;
        }

        function updateZones(gamma, beta) {
            document.querySelectorAll('.threshold-zone, .threshold-bar').forEach(z => {
                if (z.classList.contains('threshold-zone')) z.classList.remove('active');
            });
            
            let activeZone = 'a';
            
            if (gamma > GAMMA_THRESHOLD) {
                activeZone = 'c';
            } else if (gamma < -GAMMA_THRESHOLD) {
                activeZone = 'b';
            } else if (beta > BETA_THRESHOLD_POS) {
                activeZone = 'd';
            } else if (beta < BETA_THRESHOLD_NEG) {
                activeZone = 'e';
            }
            
            const zoneEl = document.getElementById('zone-' + activeZone);
            if (zoneEl) zoneEl.classList.add('active');
            
            return activeZone.toUpperCase();
        }

        function lockRotations(temporary = true) {
            isLocked = true;
            isPermanentlyLocked = !temporary;
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.add('active');
            lockIndicator.classList.remove('starting', 'permanent');
            
            if (!temporary) {
                lockIndicator.classList.add('permanent');
                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small>Définitivement</small>';
                document.getElementById('main-status').textContent = '🔒 IMAGE VERROUILLÉE';
                document.getElementById('status-box').classList.add('locked');
                log('🔒 VERROUILLAGE PERMANENT ACTIVÉ', 'success');
            } else {
                lockIndicator.classList.add('starting');
                lockIndicator.innerHTML = '⏳ DÉMARRAGE...<br><small id="countdown">4s</small><div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>';
                document.getElementById('main-status').textContent = '⏳ Attente 4 secondes...';
                
                let remaining = 4;
                const countdownEl = document.getElementById('countdown');
                const progressFill = document.getElementById('progress-fill');
                countdownEl.textContent = remaining + 's';
                progressFill.style.width = '100%';                
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    remaining -= 0.1;
                    countdownEl.textContent = Math.ceil(remaining) + 's';
                    progressFill.style.width = (remaining / 4 * 100) + '%';
                }, 100);
                
                if (lockTimeout) clearTimeout(lockTimeout);
                lockTimeout = setTimeout(() => {
                    unlockRotations();
                    if (countdownInterval) clearInterval(countdownInterval);
                }, LOCK_DURATION);
            }
            
            document.querySelectorAll('.test-btn').forEach(btn => btn.disabled = true);
        }

        function unlockRotations() {
            isLocked = false;
            isPermanentlyLocked = false;
            
            gammaRef = window.lastGamma || 0;
            betaRef = lastValidBeta;
            
            log(`✅ Déverrouillé - GammaRef: ${gammaRef}° | BetaRef: ${betaRef}°`, 'success');
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.remove('active', 'permanent', 'starting');
            
            document.getElementById('main-status').textContent = '🎯 Bouge ton téléphone !';
            document.getElementById('status-box').classList.remove('locked');
            
            document.querySelectorAll('.test-btn').forEach(btn => btn.disabled = false);
        }

        function updateGammaDisplay(value) {
            const el = document.getElementById('gamma-value');
            el.textContent = Math.round(value) + '°';
            el.classList.remove('gamma-positive', 'gamma-negative', 'gamma-zero');
            if (value > 5) el.classList.add('gamma-positive');
            else if (value < -5) el.classList.add('gamma-negative');
            else el.classList.add('gamma-zero');
        }

        function updateBetaDisplay(value) {
            const el = document.getElementById('beta-value');
            el.textContent = Math.round(value) + '°';
            el.classList.remove('beta-positive', 'beta-negative', 'beta-zero');
            if (value > 5) el.classList.add('beta-positive');            else if (value < -5) el.classList.add('beta-negative');
            else el.classList.add('beta-zero');
        }

        function changeImage(zone) {
            log(`🖼️ CHANGEMENT: Image A → ${zone} (VERROUILLAGE PERMANENT)`, 'success');
            
            document.querySelectorAll('.my-image').forEach(img => img.classList.remove('show'));
            
            const newImg = document.getElementById('img-' + zone.toLowerCase());
            if (newImg) {
                newImg.classList.add('show');
                document.getElementById('current-img').textContent = zone;
                
                // VERROUILLAGE PERMANENT
                lockRotations(false);
            }
        }

        function manualShow(letter) {
            log(`👤 Manuel: Image ${letter}`, 'info');
            
            document.querySelectorAll('.my-image').forEach(img => img.classList.remove('show'));
            
            const targetImg = document.getElementById('img-' + letter.toLowerCase());
            if (targetImg) {
                targetImg.classList.add('show');
            }
            
            gammaHist = [];
            betaHist = [];
            
            lockRotations(true);
        }

        async function activateAndStart() {
            log('🔑 Demande de permission...', 'info');
            
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        log('✅ Permission accordée', 'success');
                        activateSensors();
                        setTimeout(() => manualShow('A'), 500);
                    } else {
                        log('❌ Permission refusée', 'error');
                        alert('Permission refusée');
                    }                } catch (e) {
                    log('❌ Erreur: ' + e.message, 'error');
                    alert('Erreur: ' + e.message);
                }
            } else {
                log('✅ Android - pas de permission requise', 'success');
                activateSensors();
                setTimeout(() => manualShow('A'), 500);
            }
        }

        document.getElementById('btn-permission').addEventListener('click', activateAndStart);

        function activateSensors() {
            document.getElementById('btn-permission').style.display = 'none';
            log('✅ Capteurs activés', 'success');
            
            window.addEventListener('deviceorientation', function(event) {
                // Si verrouillé permanent, on ignore TOUT
                if (isPermanentlyLocked) {
                    return;
                }
                
                let rawGamma = event.gamma;
                let rawBeta = event.beta;
                
                if (rawGamma === null || rawGamma === undefined) rawGamma = 0;
                
                // VALIDER BETA avant tout
                rawBeta = validateBeta(rawBeta);
                
                rawGamma = normalizeGamma(rawGamma);
                
                window.lastGamma = rawGamma;

                if (isLocked) {
                    return;
                }

                const smoothGamma = smooth(rawGamma, gammaHist);
                const smoothBeta = smooth(rawBeta, betaHist);

                let gammaRel = smoothGamma - gammaRef;
                let betaRel = smoothBeta - betaRef;
                
                gammaRel = normalizeGamma(gammaRel);

                document.getElementById('gamma-rel').textContent = Math.round(gammaRel) + '°';
                document.getElementById('beta-rel').textContent = Math.round(betaRel) + '°';
                updateGammaDisplay(gammaRel);                updateBetaDisplay(betaRel);

                const potentialZone = updateZones(gammaRel, betaRel);
                const currentImg = 'A'; // Après manualShow, c'est toujours A

                log(`📊 Gamma: ${Math.round(gammaRel)}° | Beta: ${Math.round(betaRel)}° | Zone: ${potentialZone}`, 'info');

                if (potentialZone !== currentImg) {
                    if (pendingZone !== potentialZone) {
                        pendingZone = potentialZone;
                        stableStartTime = Date.now();
                        log(`🎯 Zone potentielle: ${potentialZone}`, 'warning');
                    }
                    
                    const elapsed = Date.now() - stableStartTime;
                    
                    if (elapsed >= STABILITY_TIME) {
                        log(`✅ SEUIL ATTEINT ! Changement vers ${potentialZone}`, 'success');
                        changeImage(potentialZone);
                        pendingZone = null;
                    }
                } else {
                    pendingZone = null;
                }
            });
        }

        log('📱 Page chargée - Prêt!', 'info');
    </script>
</body>
</html>
