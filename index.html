<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation Magique</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        #image-container {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* On cache tout par défaut */
        }

        img.active {
            display: block; /* On affiche l'image active */
        }

        #info {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
        #permission-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            display: none; /* Caché si pas besoin */
        }
        
        .status {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="image-container">
        <!-- Remplace les src par tes propres images -->
        <img id="img-a" src="https://picsum.photos/300/300?random=1" class="active" alt="Image A">
        <img id="img-b" src="https://picsum.photos/300/300?random=2" alt="Image B">
        <img id="img-c" src="https://picsum.photos/300/300?random=3" alt="Image C">
    </div>

    <div id="info">
        Pose ton téléphone à plat et tourne-le !<br>
        <span id="angle-display">Angle: 0°</span>
    </div>

    <button id="permission-btn">Activer les capteurs</button>
    <div class="status" id="status-msg">En attente de permission...</div>

    <script>
        const btn = document.getElementById('permission-btn');
        const statusMsg = document.getElementById('status-msg');
        const angleDisplay = document.getElementById('angle-display');
        
        const imgA = document.getElementById('img-a');
        const imgB = document.getElementById('img-b');
        const imgC = document.getElementById('img-c');

        // 1. GESTION DE LA PERMISSION (Nécessaire pour iOS 13+ et Android récent)
        function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            startListening();
                        } else {
                            alert("Permission refusée. La page ne fonctionnera pas.");
                        }
                    })
                    .catch(console.error);
            } else {
                // Android ou iOS ancien (pas de permission nécessaire)
                startListening();
            }
        }

        btn.addEventListener('click', requestPermission);

        // 2. ÉCOUTE DES MOUVEMENTS
        function startListening() {
            btn.style.display = 'none';
            statusMsg.innerText = "Capteurs actifs !";
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            // 'alpha' est la rotation autour de l'axe Z (la boussole)
            // Valeurs : 0 à 360 (ou -180 à 180 selon le navigateur)
            let alpha = event.alpha;

            // 'beta' est l'inclinaison avant/arrière
            // 'gamma' est l'inclinaison gauche/droite
            let beta = event.beta;
            let gamma = event.gamma;

            // Affichage de debug
            angleDisplay.innerText = `Alpha: ${Math.round(alpha)}° | Beta: ${Math.round(beta)}°`;

            // VÉRIFICATION : Est-ce que le téléphone est posé à plat ?
            // Si Beta et Gamma sont proches de 0, le téléphone est plat.
            // On tolère une petite marge (ex: +/- 20 degrés)
            if (Math.abs(beta) < 20 && Math.abs(gamma) < 20) {
                
                // Normalisation de l'alpha pour avoir des valeurs entre -180 et 180
                if (alpha > 180) { alpha = alpha - 360; }

                // LOGIQUE DE CHANGEMENT D'IMAGE
                // On considère que 0 est le centre (Image A)
                
                if (alpha > -45 && alpha < 45) {
                    // Centre : Image A                    showImage('A');
                } else if (alpha <= -45) {
                    // Tourné vers la GAUCHE (négatif) : Image B
                    showImage('B');
                } else if (alpha >= 45) {
                    // Tourné vers la DROITE (positif) : Image C
                    showImage('C');
                }

            } else {
                // Si le téléphone n'est pas plat, on peut remettre l'image A ou ne rien faire
                // showImage('A'); 
            }
        }

        function showImage(letter) {
            // On cache tout
            imgA.classList.remove('active');
            imgB.classList.remove('active');
            imgC.classList.remove('active');

            // On affiche la bonne
            if (letter === 'A') imgA.classList.add('active');
            if (letter === 'B') imgB.classList.add('active');
            if (letter === 'C') imgC.classList.add('active');
        }
    </script>
</body>
</html>
