<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERSION SIMPLE - CAPTEURS BRUTS</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            border-radius: 15px;
            overflow: hidden;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;            max-width: 300px;
        }

        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .test-btn {
            background-color: #28a745;
            color: white;
        }

        .test-btn:disabled {
            background-color: #555;
            opacity: 0.5;
        }

        .sensor-display {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .sensor-box {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .sensor-value {
            font-size: 36px;
            font-weight: bold;
            font-family: monospace;
        }

        .gamma-value { color: #ff6b6b; }
        .beta-value { color: #ff9ff3; }

        #status {
            background-color: #1a4a1a;
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-size: 18px;
            font-weight: bold;        }

        #status.locked {
            background-color: #4a1a1a;
            border-color: #ff0000;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log { margin: 3px 0; }
        .log-error { color: #ff0000; }
        .log-success { color: #00ff00; }
        .log-warning { color: #ffaa00; }

        .thresholds {
            background-color: #2a1a3a;
            border: 2px solid #aa00ff;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">🎯 VERSION TEST SIMPLE</h2>

    <div id="status">👆 Clique sur "ACTIVER CAPTEURS"</div>

    <div class="thresholds">
        📐 GAMMA: +15° = C | -15° = B<br>
        📏 BETA: +15° = D | -8° = E
    </div>

    <button id="btn-permission">🔓 ACTIVER CAPTEURS</button>

    <div id="image-container" style="position: relative;">
        <img id="img-a" class="my-image show" src="https://picsum.photos/seed/fleur123/300/300" style="position: absolute;">
        <img id="img-b" class="my-image" src="https://picsum.photos/seed/montagne456/300/300" style="position: absolute;">
        <img id="img-c" class="my-image" src="https://picsum.photos/seed/ocean789/300/300" style="position: absolute;">        <img id="img-d" class="my-image" src="https://picsum.photos/seed/soleil111/300/300" style="position: absolute;">
        <img id="img-e" class="my-image" src="https://picsum.photos/seed/lune222/300/300" style="position: absolute;">
    </div>

    <div class="sensor-display">
        <div class="sensor-box">
            <div style="color: #aaa; font-size: 12px;">GAMMA</div>
            <div id="gamma" class="sensor-value gamma-value">0°</div>
        </div>
        <div class="sensor-box">
            <div style="color: #aaa; font-size: 12px;">BETA</div>
            <div id="beta" class="sensor-value beta-value">0°</div>
        </div>
    </div>

    <button class="test-btn" id="btn-a" onclick="setImg('A')">🔵 A</button>
    <button class="test-btn" id="btn-b" onclick="setImg('B')">🟢 B</button>
    <button class="test-btn" id="btn-c" onclick="setImg('C')">🔴 C</button>
    <button class="test-btn" id="btn-d" onclick="setImg('D')">🟡 D</button>
    <button class="test-btn" id="btn-e" onclick="setImg('E')">🟣 E</button>

    <div id="debug"></div>

    <script>
        let locked = false;
        let gammaRef = 0;
        let betaRef = 0;
        let sensorsReady = false;

        function log(msg, type = '') {
            const d = document.getElementById('debug');
            const entry = document.createElement('div');
            entry.className = 'log ' + (type ? 'log-' + type : '');
            entry.textContent = msg;
            d.insertBefore(entry, d.firstChild);
            while (d.children.length > 20) d.removeChild(d.lastChild);
        }

        function showImage(letter) {
            log(`🖼️ Image: ${letter}`, 'success');
            ['a','b','c','d','e'].forEach(id => {
                document.getElementById('img-' + id).classList.remove('show');
            });
            document.getElementById('img-' + letter.toLowerCase()).classList.add('show');
        }

        function setImg(letter) {
            if (locked) {
                log('🔒 DÉJÀ VERROUILLÉ!', 'error');
                return;            }
            showImage(letter);
            startLockdown();
        }

        function startLockdown() {
            locked = true;
            const status = document.getElementById('status');
            status.textContent = '🔒 VERROUILLÉ - IMAGE FIXE';
            status.classList.add('locked');
            document.getElementById('btn-permission').style.display = 'none';
            document.querySelectorAll('.test-btn').forEach(b => b.disabled = true);
            log('🔒 VERROUILLAGE PERMANENT ACTIVÉ', 'success');
        }

        function startCountdown() {
            const status = document.getElementById('status');
            let seconds = 4;
            status.textContent = `⏳ ${seconds}s...`;
            
            const interval = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    status.textContent = `⏳ ${seconds}s...`;
                } else {
                    clearInterval(interval);
                    status.textContent = '🎯 BOUGE TON TÉLÉPHONE!';
                    sensorsReady = true;
                    log('✅ CAPTEURS ACTIFS!', 'success');
                }
            }, 1000);
        }

        async function activateSensors() {
            log('🔑 Demande permission...', 'warning');

            const requestPermission = async () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && 
                    typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const response = await DeviceOrientationEvent.requestPermission();
                        if (response === 'granted') {
                            log('✅ Permission accordée', 'success');
                            return true;
                        } else {
                            log('❌ Permission refusée', 'error');
                            return false;
                        }
                    } catch (e) {
                        log('❌ Erreur: ' + e.message, 'error');                        return false;
                    }
                } else {
                    log('✅ Android - pas de permission', 'success');
                    return true;
                }
            };

            const granted = await requestPermission();
            if (!granted) return;

            document.getElementById('btn-permission').style.display = 'none';
            showImage('A');
            startCountdown();

            // ÉCOUTEUR DE CAPTEURS - LE PLUS SIMPLE POSSIBLE
            window.addEventListener('deviceorientation', function(event) {
                // Si verrouillé, on sort IMMÉDIATEMENT
                if (locked) return;

                // Si pas encore prêt (pendant les 4s), on sort
                if (!sensorsReady) return;

                // Récupérer valeurs
                let gamma = event.gamma;
                let beta = event.beta;

                // Gérer null
                if (gamma === null || gamma === undefined) gamma = 0;
                if (beta === null || beta === undefined) beta = 0;

                // Limiter gamma entre -90 et 90
                if (gamma > 90) gamma = 90;
                if (gamma < -90) gamma = -90;

                // IGNORER BETA si valeur absurde (saute à -360 etc)
                if (beta < -90 || beta > 90) {
                    beta = 0; // On ignore, on met 0
                }

                // Afficher valeurs
                document.getElementById('gamma').textContent = Math.round(gamma) + '°';
                document.getElementById('beta').textContent = Math.round(beta) + '°';

                // Calculer relatif à la référence (capturée après les 4s)
                let gammaRel = gamma - gammaRef;
                let betaRel = beta - betaRef;

                // Log toutes les 10 lectures pour ne pas spammer
                if (Math.random() < 0.1) {                    log(`📊 G:${Math.round(gammaRel)}° B:${Math.round(betaRel)}°`, '');
                }

                // VÉRIFIER LES SEUILS
                let newImage = null;

                if (gammaRel > 15) {
                    newImage = 'C';
                    log(`✅ GAMMA > 15° (${Math.round(gammaRel)}°) → C`, 'success');
                } else if (gammaRel < -15) {
                    newImage = 'B';
                    log(`✅ GAMMA < -15° (${Math.round(gammaRel)}°) → B`, 'success');
                } else if (betaRel > 15) {
                    newImage = 'D';
                    log(`✅ BETA > 15° (${Math.round(betaRel)}°) → D`, 'success');
                } else if (betaRel < -8) {
                    newImage = 'E';
                    log(`✅ BETA < -8° (${Math.round(betaRel)}°) → E`, 'success');
                }

                // Si une image doit changer
                if (newImage) {
                    log(`🎯 CHANGEMENT: A → ${newImage}`, 'success');
                    showImage(newImage);
                    startLockdown();
                }
            });

            log('✅ Écouteur deviceorientation activé', 'success');
        }

        // Capturer la référence APRÈS les 4 secondes
        const originalStartCountdown = startCountdown;
        startCountdown = function() {
            let seconds = 4;
            const status = document.getElementById('status');
            status.textContent = `⏳ ${seconds}s...`;
            
            const interval = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    status.textContent = `⏳ ${seconds}s...`;
                } else {
                    clearInterval(interval);
                    status.textContent = '🎯 BOUGE TON TÉLÉPHONE!';
                    sensorsReady = true;
                    
                    // CAPTURER LA RÉFÉRENCE MAINTENANT
                    gammaRef = 0;
                    betaRef = 0;                    log(`📐 Références capturées: G=${gammaRef}° B=${betaRef}°`, 'success');
                    log('✅ CAPTEURS ACTIFS!', 'success');
                }
            }, 1000);
        }

        document.getElementById('btn-permission').addEventListener('click', activateSensors);

        log('📱 Page chargée', 'warning');
        log('🔒 Protocol: ' + window.location.protocol, 'warning');
    </script>
</body>
</html>
