<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation Magique</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        #image-container {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        img.active {
            display: block;
        }

        #info {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
        #permission-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            /* MODIFICATION ICI : le bouton est visible par défaut */
            display: block;
        }
        
        .status {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="image-container">
        <!-- Remplace les src par tes propres images -->
        <img id="img-a" src="https://picsum.photos/300/300?random=1" class="active" alt="Image A">
        <img id="img-b" src="https://picsum.photos/300/300?random=2" alt="Image B">
        <img id="img-c" src="https://picsum.photos/300/300?random=3" alt="Image C">
    </div>

    <div id="info">
        Pose ton téléphone à plat et tourne-le !<br>
        <span id="angle-display">Angle: 0°</span>
    </div>

    <button id="permission-btn">🔓 Activer les capteurs de mouvement</button>
    <div class="status" id="status-msg">Clique sur le bouton pour commencer</div>

    <script>
        const btn = document.getElementById('permission-btn');
        const statusMsg = document.getElementById('status-msg');
        const angleDisplay = document.getElementById('angle-display');
        
        const imgA = document.getElementById('img-a');
        const imgB = document.getElementById('img-b');
        const imgC = document.getElementById('img-c');

        let permissionGranted = false;

        // Fonction pour demander la permission        async function requestPermission() {
            // iOS 13+
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        permissionGranted = true;
                        startListening();
                    } else {
                        statusMsg.innerText = "❌ Permission refusée";
                        alert("Permission refusée. La page ne fonctionnera pas.");
                    }
                } catch (error) {
                    console.error(error);
                    statusMsg.innerText = "❌ Erreur: " + error;
                }
            } else {
                // Android et autres navigateurs
                permissionGranted = true;
                startListening();
            }
        }

        btn.addEventListener('click', requestPermission);

        function startListening() {
            btn.style.display = 'none';
            statusMsg.innerText = "✅ Capteurs actifs ! Pose ton téléphone à plat.";
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            let alpha = event.alpha;
            let beta = event.beta;
            let gamma = event.gamma;

            // Affichage de debug
            if (alpha !== null) {
                angleDisplay.innerText = `Alpha: ${Math.round(alpha)}° | Beta: ${Math.round(beta)}°`;
            }

            // Vérification : téléphone à plat ?
            if (beta !== null && gamma !== null && Math.abs(beta) < 30 && Math.abs(gamma) < 30) {
                
                // Normalisation alpha
                if (alpha > 180) { alpha = alpha - 360; }

                // Logique de changement
                if (alpha > -45 && alpha < 45) {
                    showImage('A');                } else if (alpha <= -45) {
                    showImage('B');
                } else if (alpha >= 45) {
                    showImage('C');
                }

            }
        }

        function showImage(letter) {
            imgA.classList.remove('active');
            imgB.classList.remove('active');
            imgC.classList.remove('active');

            if (letter === 'A') imgA.classList.add('active');
            if (letter === 'B') imgB.classList.add('active');
            if (letter === 'C') imgC.classList.add('active');
        }
    </script>
</body>
</html>
