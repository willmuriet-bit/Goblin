<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détecteur d'Aimant</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    margin-top:30px;
}

#value{
    font-size:40px;
    margin:20px 0;
}

#status{
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#00ff99;
    color:black;
    cursor:pointer;
}

.bar-container{
    width:80%;
    height:20px;
    background:#333;
    margin:20px auto;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>

<body>

<h1>🧲 Détecteur d'Aimant</h1>

<div id="value">0 µT</div>

<div class="bar-container">
    <div class="bar" id="bar"></div>
</div>

<div id="status">En attente...</div>

<button onclick="startSensor()">Activer le capteur</button>

<script>

let sensor;
let threshold = 150; // seuil détection

function startSensor(){

    if ('Magnetometer' in window) {

        sensor = new Magnetometer({frequency: 10});

        sensor.addEventListener('reading', () => {

            let x = sensor.x;
            let y = sensor.y;
            let z = sensor.z;

            let total = Math.sqrt(x*x + y*y + z*z);

            document.getElementById("value").innerText = total.toFixed(2) + " µT";

            // barre visuelle
            let percent = Math.min((total / 300) * 100, 100);
            document.getElementById("bar").style.width = percent + "%";

            if(total > threshold){
                document.getElementById("status").innerText = "🧲 AIMANT DÉTECTÉ !";
                document.getElementById("status").style.color = "red";
                navigator.vibrate(200);
            }else{
                document.getElementById("status").innerText = "Aucun aimant";
                document.getElementById("status").style.color = "lime";
            }

        });

        sensor.start();

    } else {
        alert("Magnétomètre non supporté sur ce navigateur.");
    }
}

</script>

</body>
</html>
