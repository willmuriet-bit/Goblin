<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation avec Verrouillage Intelligent</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;            font-weight: bold;
        }

        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .test-btn {
            background-color: #28a745;
            color: white;
            margin: 5px auto;
        }

        .test-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 20px;
        }

        .line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #555;
            padding-left: 10px;
        }

        .highlight {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
        }

        .locked {
            color: #ff0;
            font-weight: bold;
        }

        .unlocked {
            color: #0f0;
            font-weight: bold;        }

        .permanently-locked {
            color: #f00;
            font-weight: bold;
        }

        .grace-period {
            color: #0ff;
            font-weight: bold;
        }

        #lock-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 165, 0, 0.9);
            color: black;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            display: none;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #lock-indicator.active {
            display: block;
            animation: pulse 1s infinite;
        }

        #lock-indicator.permanent {
            background-color: rgba(255, 0, 0, 0.9);
            color: white;
            animation: none;
        }

        #lock-indicator.grace {
            background-color: rgba(0, 255, 255, 0.9);
            color: black;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-bar {            width: 100%;
            height: 5px;
            background-color: #333;
            margin-top: 10px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #ff9500;
            width: 100%;
            transition: width 0.1s linear;
        }

        .counters-container {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .counter-box {
            background-color: #333;
            border-radius: 10px;
            padding: 15px;
            margin: 5px;
            min-width: 120px;
            text-align: center;
        }

        .counter-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .counter-value {
            font-size: 28px;
            font-weight: bold;
        }

        .alpha-positive { color: #ff6b6b; }
        .alpha-negative { color: #4ecdc4; }
        .alpha-zero { color: #00ff00; }
        
        .beta-positive { color: #ff9ff3; }
        .beta-negative { color: #54a0ff; }
        .beta-zero { color: #00ff00; }
        .threshold-info {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background-color: #2a2a2a;
            border-radius: 10px;
            font-size: 14px;
        }

        .threshold-info span {
            color: #ffd93d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="lock-indicator">
        🔒 VERROUILLÉ<br>
        <small id="countdown">10s</small>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <button id="btn-permission">🔓 Activer Capteurs</button>

    <div id="image-container">
        <!-- 5 IMAGES FIXES - Ne changent jamais -->
        <img id="img-a" class="my-image show" src="https://picsum.photos/seed/fleur123/300/300" alt="Image A - Fleur">
        <img id="img-b" class="my-image" src="https://picsum.photos/seed/montagne456/300/300" alt="Image B - Montagne">
        <img id="img-c" class="my-image" src="https://picsum.photos/seed/ocean789/300/300" alt="Image C - Océan">
        <img id="img-d" class="my-image" src="https://picsum.photos/seed/soleil111/300/300" alt="Image D - Soleil">
        <img id="img-e" class="my-image" src="https://picsum.photos/seed/lune222/300/300" alt="Image E - Lune">
    </div>

    <div class="counters-container">
        <div class="counter-box">
            <div class="counter-title">📐 ALPHA (Gauche/Droite)</div>
            <div id="alpha-value" class="counter-value alpha-zero">0°</div>
        </div>
        <div class="counter-box">
            <div class="counter-title">📏 BETA (Haut/Bas)</div>
            <div id="beta-value" class="counter-value beta-zero">0°</div>
        </div>
    </div>

    <div class="threshold-info">
        🎯 Seuil: <span>±15°</span> | Alpha: A/B/C | Beta: A/D/E
    </div>
    <button class="test-btn" id="btn-a" onclick="manualShow('A')">🔵 Image A (Fleur)</button>
    <button class="test-btn" id="btn-b" onclick="manualShow('B')">🟢 Image B (Montagne)</button>
    <button class="test-btn" id="btn-c" onclick="manualShow('C')">🔴 Image C (Océan)</button>
    <button class="test-btn" id="btn-d" onclick="manualShow('D')">🟡 Image D (Soleil)</button>
    <button class="test-btn" id="btn-e" onclick="manualShow('E')">🟣 Image E (Lune)</button>

    <div id="debug">
        <div class="line">Statut capteurs: <span id="status">En attente</span></div>
        <div class="line">État: <span id="lock-status" class="unlocked">🔓 DÉVERROUILLÉ</span></div>
        <div class="line">Alpha brut: <span id="alpha-raw">-</span>°</div>
        <div class="line">Alpha relatif: <span id="alpha-relative" class="highlight">0°</span></div>
        <div class="line">Beta: <span id="beta-raw" class="highlight">0°</span></div>
        <div class="line">Image active: <span id="current-img" class="highlight">A</span></div>
        <div class="line">Mode: <span id="mode">Clique sur un bouton pour commencer</span></div>
    </div>

    <script>
        let sensorsActive = false;
        let isLocked = false;
        let isPermanentlyLocked = false;
        let isGracePeriod = false;
        let lockTimeout = null;
        let countdownInterval = null;
        let graceTimeout = null;
        
        // Références pour calcul relatif
        let alphaReference = 0;
        let alphaRelative = 0;
        let betaRelative = 0;
        let betaReference = 0;
        
        const LOCK_DURATION = 10000;
        const GRACE_DURATION = 2000;
        const ROTATION_THRESHOLD = 15; // Seuil changé de 30° à 15°

        function lockRotations(temporary = true) {
            isLocked = true;
            isPermanentlyLocked = !temporary;
            isGracePeriod = false;
            
            const lockIndicator = document.getElementById('lock-indicator');
            
            lockIndicator.classList.add('active');
            lockIndicator.classList.remove('permanent', 'grace');
            
            if (isPermanentlyLocked) {
                lockIndicator.classList.add('permanent');
                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small>Définitivement</small>';
                document.getElementById('lock-status').textContent = '🔒 VERROUILLÉ (PERMANENT)';                document.getElementById('lock-status').className = 'permanently-locked';
                document.getElementById('mode').textContent = 'Rotations désactivées';
            } else {
                lockIndicator.innerHTML = '🔒 VERROUILLÉ<br><small id="countdown">10s</small><div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>';
                document.getElementById('lock-status').textContent = '🔒 VERROUILLÉ';
                document.getElementById('lock-status').className = 'locked';
                document.getElementById('mode').textContent = 'Attente 10s...';
                
                let remaining = 10;
                const countdownEl = document.getElementById('countdown');
                const progressFill = document.getElementById('progress-fill');
                countdownEl.textContent = remaining + 's';
                progressFill.style.width = '100%';
                
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    remaining -= 0.1;
                    const seconds = Math.ceil(remaining);
                    countdownEl.textContent = seconds + 's';
                    progressFill.style.width = (remaining / 10 * 100) + '%';
                }, 100);
                
                if (lockTimeout) clearTimeout(lockTimeout);
                lockTimeout = setTimeout(() => {
                    startGracePeriod();
                    if (countdownInterval) clearInterval(countdownInterval);
                }, LOCK_DURATION);
            }
            
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        function startGracePeriod() {
            isLocked = true;
            isGracePeriod = true;
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.remove('permanent');
            lockIndicator.classList.add('grace');
            lockIndicator.innerHTML = '⏳ PRÉPARATION...<br><small id="grace-countdown">2s</small>';
            
            document.getElementById('lock-status').textContent = '⏳ PÉRIODE DE GRÂCE';
            document.getElementById('lock-status').className = 'grace-period';
            document.getElementById('mode').textContent = 'Préparation des capteurs...';
            
            let graceRemaining = 2;
            const graceCountdownEl = document.getElementById('grace-countdown');
            graceCountdownEl.textContent = graceRemaining + 's';            
            if (graceTimeout) clearTimeout(graceTimeout);
            graceTimeout = setTimeout(() => {
                endGracePeriod();
            }, GRACE_DURATION);
        }

        function endGracePeriod() {
            // Capturer les positions actuelles comme référence (0°)
            alphaReference = window.currentAlpha || 0;
            betaReference = window.currentBeta || 0;
            alphaRelative = 0;
            betaRelative = 0;
            
            console.log('🎯 Références définies - Alpha:', alphaReference, 'Beta:', betaReference);
            
            unlockRotations();
        }

        function updateAlphaDisplay(value) {
            const alphaValue = document.getElementById('alpha-value');
            alphaValue.textContent = Math.round(value) + '°';
            
            alphaValue.classList.remove('alpha-positive', 'alpha-negative', 'alpha-zero');
            if (value > 0) {
                alphaValue.classList.add('alpha-positive');
            } else if (value < 0) {
                alphaValue.classList.add('alpha-negative');
            } else {
                alphaValue.classList.add('alpha-zero');
            }
        }

        function updateBetaDisplay(value) {
            const betaValue = document.getElementById('beta-value');
            betaValue.textContent = Math.round(value) + '°';
            
            betaValue.classList.remove('beta-positive', 'beta-negative', 'beta-zero');
            if (value > 0) {
                betaValue.classList.add('beta-positive');
            } else if (value < 0) {
                betaValue.classList.add('beta-negative');
            } else {
                betaValue.classList.add('beta-zero');
            }
        }

        function unlockRotations() {
            isLocked = false;
            isPermanentlyLocked = false;            isGracePeriod = false;
            
            const lockIndicator = document.getElementById('lock-indicator');
            lockIndicator.classList.remove('active', 'permanent', 'grace');
            
            document.getElementById('lock-status').textContent = '🔓 DÉVERROUILLÉ (bouge ton téléphone!)';
            document.getElementById('lock-status').className = 'unlocked';
            document.getElementById('mode').textContent = 'Rotation ACTIVE - ±15° = changement';
            
            // Réinitialiser les affichages à 0
            updateAlphaDisplay(0);
            updateBetaDisplay(0);
            
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        function manualShow(letter) {
            console.log('👤 Manuel: affichage image', letter);
            
            document.querySelectorAll('.my-image').forEach(img => {
                img.classList.remove('show');
            });
            
            const targetImg = document.getElementById('img-' + letter.toLowerCase());
            if (targetImg) {
                targetImg.classList.add('show');
                document.getElementById('current-img').textContent = letter;
            }
            
            lockRotations(true);
        }

        document.getElementById('btn-permission').addEventListener('click', async function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        activateSensors();
                    } else {
                        alert('Permission refusée');
                    }
                } catch (e) {
                    alert('Erreur: ' + e.message);
                }
            } else {
                activateSensors();
            }        });

        function activateSensors() {
            sensorsActive = true;
            document.getElementById('status').textContent = '✅ ACTIF';
            document.getElementById('status').style.color = '#00ff00';
            document.getElementById('btn-permission').style.display = 'none';
            document.getElementById('mode').textContent = 'Clique sur un bouton (A/B/C/D/E) pour commencer';
            
            window.addEventListener('deviceorientation', function(event) {
                // Stocker les valeurs brutes
                window.currentAlpha = event.alpha || 0;
                window.currentBeta = event.beta || 0;
                
                // Afficher alpha et beta bruts
                document.getElementById('alpha-raw').textContent = Math.round(window.currentAlpha);
                document.getElementById('beta-raw').textContent = Math.round(window.currentBeta);

                // SI VERROUILLÉ, on ignore
                if (isLocked) {
                    return;
                }

                // Si aucun bouton n'a été cliqué encore, on ne fait rien
                if (document.getElementById('mode').textContent.includes('Clique sur un bouton')) {
                    return;
                }

                // Calculer les valeurs RELATIVES par rapport aux références
                alphaRelative = window.currentAlpha - alphaReference;
                betaRelative = window.currentBeta - betaReference;
                
                // Normaliser alpha entre -180 et 180
                if (alphaRelative > 180) {
                    alphaRelative = alphaRelative - 360;
                } else if (alphaRelative < -180) {
                    alphaRelative = alphaRelative + 360;
                }
                
                // Afficher les valeurs relatives
                document.getElementById('alpha-relative').textContent = Math.round(alphaRelative) + '°';
                updateAlphaDisplay(alphaRelative);
                updateBetaDisplay(betaRelative);

                // Déterminer l'image selon Alpha ET Beta
                let targetImage = 'A';

                // Priorité à BETA (haut/bas)
                if (betaRelative > ROTATION_THRESHOLD) {
                    // Beta > +15° (téléphone incliné vers le haut) → Image D                    targetImage = 'D';
                } else if (betaRelative < -ROTATION_THRESHOLD) {
                    // Beta < -15° (téléphone incliné vers le bas) → Image E
                    targetImage = 'E';
                } 
                // Sinon, vérifier ALPHA (gauche/droite)
                else if (alphaRelative > ROTATION_THRESHOLD) {
                    // Alpha > +15° (droite) → Image C
                    targetImage = 'C';
                } else if (alphaRelative < -ROTATION_THRESHOLD) {
                    // Alpha < -15° (gauche) → Image B
                    targetImage = 'B';
                }
                // Sinon → Image A (centre)

                // Changer l'image seulement si différent
                const currentDisplayed = document.getElementById('current-img').textContent;
                if (currentDisplayed !== targetImage) {
                    console.log('🔄 Changement:', currentDisplayed, '→', targetImage, 
                        '(Alpha:', Math.round(alphaRelative) + '°, Beta:', Math.round(betaRelative) + '°)');
                    
                    document.querySelectorAll('.my-image').forEach(img => {
                        img.classList.remove('show');
                    });
                    
                    const newImg = document.getElementById('img-' + targetImage.toLowerCase());
                    if (newImg) {
                        newImg.classList.add('show');
                        document.getElementById('current-img').textContent = targetImage;
                        
                        // VERROUILLER DÉFINITIVEMENT après le premier changement
                        lockRotations(false);
                    }
                }
            });
        }

        console.log('📱 Page chargée - Prêt!');
    </script>
</body>
</html>
