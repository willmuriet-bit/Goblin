<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pad Interactif Pro</title>
    <style>
        :root {
            --primary: #333;
            --bg: #ffffff;
            --border-flash: #ff0000;
            --danger: #dc3545;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .view {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            background: white;
            z-index: 10;
        }

        .view.active {
            display: flex;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2rem;
            border: 2px solid var(--primary);            background: white;
            color: var(--primary);
            cursor: pointer;
            border-radius: 8px;
            min-width: 200px;
            z-index: 100;
        }

        button:active {
            background: var(--primary);
            color: white;
        }

        button.small {
            padding: 10px 20px;
            font-size: 1rem;
            min-width: auto;
        }

        button.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        button.danger:active {
            background: var(--danger);
            color: white;
        }

        canvas {
            touch-action: none;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        .zone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            pointer-events: none;
            z-index: 20;
        }
        .zone-cell { }

        .zone-overlay.active {
            pointer-events: auto;
        }

        body.flash-border {
            border: 10px solid var(--border-flash);
            box-sizing: border-box;
            transition: border 0.1s;
        }

        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            gap: 20px;
            z-index: 100;
            align-items: center;
        }

        /* Bouton couleur rond */
        .color-picker-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #333;
            cursor: pointer;
            position: relative;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-picker-btn .inner-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: black;
        }

        /* Popup de couleurs */        .color-popup {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 150;
        }

        .color-popup.active {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ccc;
            cursor: pointer;
        }

        .color-option.selected {
            border-color: #000;
            border-width: 3px;
            transform: scale(1.1);
        }

        /* Bouton gomme - CERCLE GRIS AVEC RAYURES */
        .eraser-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #333;
            cursor: pointer;
            background: #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .eraser-btn::before {
            content: '';            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #cccccc,
                #cccccc 5px,
                #999999 5px,
                #999999 10px
            );
            border-radius: 50%;
        }

        .eraser-btn.active {
            background: #ffcccc;
            border-color: var(--danger);
        }

        .eraser-btn.active::before {
            background: repeating-linear-gradient(
                45deg,
                #ffcccc,
                #ffcccc 5px,
                #ff9999 5px,
                #ff9999 10px
            );
        }

        #mode-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 10px;
            background: #eee;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 100;
        }

        .list-grid {
            display: flex;
            flex-direction: column;
            width: 80%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
        }

        .zone-editor-grid {            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 90%;
            max-width: 600px;
            z-index: 100;
        }

        .editor-toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="mode-indicator">Mode: DESSIN</div>

    <!-- VUE 1: ACCUEIL -->
    <div id="view-home" class="view active">
        <h1>PAD INTERACTIF</h1>
        <button onclick="app.navigate('view-list-selector-perf')">PERFORMER</button>
        <button onclick="app.navigate('view-list-manager')">LISTE DES DESSINS</button>
    </div>

    <!-- VUE 2: GESTION DES LISTES -->
    <div id="view-list-manager" class="view">
        <h2>Mes Listes</h2>
        <div class="list-grid" id="manager-list-container"></div>
        <button class="small" onclick="app.addNewList()">+ Ajouter une liste</button>
        <button class="small" onclick="app.navigate('view-home')">Retour</button>
    </div>

    <!-- VUE 3: DÉTAIL D'UNE LISTE -->
    <div id="view-list-detail" class="view">
        <h2 id="detail-list-title">Liste X</h2>
        <button class="small" onclick="app.renameCurrentList()">Renommer la liste</button>
        <div class="zone-editor-grid" id="detail-zone-container"></div>
        <button class="small danger" onclick="app.deleteCurrentList()">🗑️ Supprimer la liste</button>        <button class="small" onclick="app.navigate('view-list-manager')">Retour aux listes</button>
    </div>

    <!-- VUE 4: SÉLECTION DE LISTE -->
    <div id="view-list-selector-perf" class="view">
        <h2>Choisir une liste pour Performer</h2>
        <div class="list-grid" id="perf-list-container"></div>
        <button class="small" onclick="app.navigate('view-home')">Annuler</button>
    </div>

    <!-- VUE 5: ÉDITEUR DE DESSIN (Zones) -->
    <div id="view-draw-editor" class="view">
        <h3 id="editor-title">Dessin Zone X</h3>
        <canvas id="editor-canvas"></canvas>
        <div class="editor-toolbar">
            <div class="color-btn selected" style="width:30px;height:30px;border-radius:50%;background:black;border:2px solid #ccc" onclick="app.setEditorColor('black', this)"></div>
            <div class="color-btn" style="width:30px;height:30px;border-radius:50%;background:red;border:2px solid #ccc" onclick="app.setEditorColor('red', this)"></div>
            <div class="color-btn" style="width:30px;height:30px;border-radius:50%;background:blue;border:2px solid #ccc" onclick="app.setEditorColor('blue', this)"></div>
            <button class="small" onclick="app.clearCanvas('editor')">Effacer</button>
            <button class="small" onclick="app.saveZoneDrawing()">Valider</button>
            <button class="small" onclick="app.navigate('view-list-detail')">Annuler</button>
        </div>
    </div>

    <!-- VUE 6: PERFORMANCE -->
    <div id="view-performance" class="view">
        <canvas id="perf-canvas"></canvas>
        <div class="zone-overlay" id="perf-zone-overlay"></div>
        
        <div class="toolbar">
            <!-- BOUTON GOMME (maintenant à gauche) -->
            <div class="eraser-btn" id="eraser-btn" onclick="app.toggleEraser()"></div>
            
            <!-- SÉLECTEUR DE COULEUR (maintenant à droite) -->
            <div class="color-picker-btn" onclick="app.toggleColorPopup()">
                <div class="inner-circle" id="current-color-indicator"></div>
            </div>
            
            <!-- Popup de couleurs -->
            <div class="color-popup" id="color-popup">
                <div class="color-option selected" style="background:black" onclick="app.selectColor('black', this)"></div>
                <div class="color-option" style="background:red" onclick="app.selectColor('red', this)"></div>
                <div class="color-option" style="background:blue" onclick="app.selectColor('blue', this)"></div>
                <div class="color-option" style="background:green" onclick="app.selectColor('green', this)"></div>
                <div class="color-option" style="background:orange" onclick="app.selectColor('orange', this)"></div>
                <div class="color-option" style="background:purple" onclick="app.selectColor('purple', this)"></div>
                <div class="color-option" style="background:pink" onclick="app.selectColor('pink', this)"></div>
                <div class="color-option" style="background:brown" onclick="app.selectColor('brown', this)"></div>
            </div>
        </div>        
        <div style="position:absolute; top:10px; left:10px; font-size:0.8rem; color:#888; z-index:100;">
            Appui long (700ms) pour activer les zones
        </div>
    </div>

    <script>
        const app = {
            data: { lists: [] },
            state: {
                currentListId: null,
                currentZoneIndex: null,
                isZoneMode: false,
                color: 'black',
                longPressTimer: null,
                isEraserMode: false,
                strokes: [],
                zoneImageLoaded: false // Nouveau: pour savoir si une image de zone est affichée
            },
            elements: {},

            init: function() {
                this.elements.perfCanvas = document.getElementById('perf-canvas');
                this.elements.editorCanvas = document.getElementById('editor-canvas');
                this.elements.perfOverlay = document.getElementById('perf-zone-overlay');
                this.elements.modeIndicator = document.getElementById('mode-indicator');
                this.elements.colorPopup = document.getElementById('color-popup');
                this.elements.currentColorIndicator = document.getElementById('current-color-indicator');
                this.elements.eraserBtn = document.getElementById('eraser-btn');

                const stored = localStorage.getItem('padApp_data');
                if (stored) {
                    this.data.lists = JSON.parse(stored);
                } else {
                    this.data.lists = [{ id: Date.now(), name: "Liste 1", zones: Array(8).fill(null) }];
                    this.saveData();
                }

                this.resizeCanvas(this.elements.perfCanvas);
                this.resizeCanvas(this.elements.editorCanvas);
                this.elements.perfCtx = this.elements.perfCanvas.getContext('2d');
                this.elements.editorCtx = this.elements.editorCanvas.getContext('2d');

                this.initZoneOverlay();
                this.renderListManager();
                
                console.log("✅ Application initialisée avec succès");
            },

            saveData: function() {                localStorage.setItem('padApp_data', JSON.stringify(this.data.lists));
            },

            navigate: function(viewId) {
                document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                
                this.elements.colorPopup.classList.remove('active');

                if (viewId === 'view-list-manager') this.renderListManager();
                if (viewId === 'view-list-selector-perf') this.renderPerfSelector();
                if (viewId === 'view-performance') this.setupPerformanceMode();
                
                console.log("📍 Navigation vers:", viewId);
            },

            renderListManager: function() {
                const container = document.getElementById('manager-list-container');
                container.innerHTML = '';
                this.data.lists.forEach(list => {
                    const btn = document.createElement('button');
                    btn.innerText = list.name;
                    btn.onclick = () => {
                        this.state.currentListId = list.id;
                        this.renderListDetail();
                        this.navigate('view-list-detail');
                    };
                    container.appendChild(btn);
                });
            },

            addNewList: function() {
                const newId = Date.now();
                this.data.lists.push({ id: newId, name: `Liste ${this.data.lists.length + 1}`, zones: Array(8).fill(null) });
                this.saveData();
                this.renderListManager();
            },

            renderListDetail: function() {
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                document.getElementById('detail-list-title').innerText = list.name;
                const container = document.getElementById('detail-zone-container');
                container.innerHTML = '';
                
                for (let i = 0; i < 8; i++) {
                    const btn = document.createElement('button');
                    btn.innerText = `Zone ${i + 1}`;
                    btn.onclick = () => {
                        this.state.currentZoneIndex = i;
                        this.prepareEditor(`Zone ${i + 1}`);                        this.navigate('view-draw-editor');
                    };
                    container.appendChild(btn);
                }
            },

            deleteCurrentList: function() {
                if (this.data.lists.length <= 1) {
                    alert("Impossible de supprimer la dernière liste !");
                    return;
                }
                if (confirm("Supprimer cette liste ?")) {
                    this.data.lists = this.data.lists.filter(l => l.id !== this.state.currentListId);
                    this.saveData();
                    this.navigate('view-list-manager');
                }
            },

            renameCurrentList: function() {
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                const newName = prompt("Nouveau nom :", list.name);
                if (newName) {
                    list.name = newName;
                    this.saveData();
                    this.renderListDetail();
                }
            },

            renderPerfSelector: function() {
                const container = document.getElementById('perf-list-container');
                container.innerHTML = '';
                this.data.lists.forEach(list => {
                    const btn = document.createElement('button');
                    btn.innerText = list.name;
                    btn.onclick = () => {
                        this.state.currentListId = list.id;
                        this.navigate('view-performance');
                    };
                    container.appendChild(btn);
                });
            },

            prepareEditor: function(title) {
                document.getElementById('editor-title').innerText = title;
                const ctx = this.elements.editorCtx;
                ctx.clearRect(0, 0, this.elements.editorCanvas.width, this.elements.editorCanvas.height);
                
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                if (list && list.zones[this.state.currentZoneIndex]) {
                    const img = new Image();                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = list.zones[this.state.currentZoneIndex];
                }
                
                this.setupDrawingMode(this.elements.editorCanvas, this.elements.editorCtx, false);
            },

            setEditorColor: function(color, btn) {
                this.state.color = color;
                document.querySelectorAll('.editor-toolbar .color-btn').forEach(b => {
                    b.style.borderColor = '#ccc';
                    b.style.transform = 'none';
                });
                btn.style.borderColor = '#000';
                btn.style.transform = 'scale(1.2)';
            },

            saveZoneDrawing: function() {
                const dataURL = this.elements.editorCanvas.toDataURL();
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                list.zones[this.state.currentZoneIndex] = dataURL;
                this.saveData();
                this.navigate('view-list-detail');
            },

            setupPerformanceMode: function() {
                const ctx = this.elements.perfCtx;
                ctx.clearRect(0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                
                this.state.isZoneMode = false;
                this.state.isEraserMode = false;
                this.state.strokes = [];
                this.state.zoneImageLoaded = false;
                
                this.elements.modeIndicator.innerText = "Mode: DESSIN";
                this.elements.modeIndicator.style.background = "#eee";
                this.elements.perfOverlay.classList.remove('active');
                this.elements.perfCanvas.style.pointerEvents = 'auto';
                this.elements.eraserBtn.classList.remove('active');
                this.elements.colorPopup.classList.remove('active');
                
                this.setupDrawingMode(this.elements.perfCanvas, this.elements.perfCtx, true);
            },

            initZoneOverlay: function() {
                this.elements.perfOverlay.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'zone-cell';
                                        cell.addEventListener('touchstart', (e) => {
                        if (this.state.isZoneMode) {
                            e.preventDefault();
                            e.stopPropagation();
                            this.loadZoneImage(i);
                        }
                    }, { passive: false });
                    
                    cell.addEventListener('mousedown', (e) => {
                        if (this.state.isZoneMode) {
                            e.preventDefault();
                            e.stopPropagation();
                            this.loadZoneImage(i);
                        }
                    });
                    
                    this.elements.perfOverlay.appendChild(cell);
                }
            },

            loadZoneImage: function(index) {
                const list = this.data.lists.find(l => l.id === this.state.currentListId);
                if (list && list.zones[index]) {
                    const ctx = this.elements.perfCtx;
                    const img = new Image();
                    img.onload = () => {
                        ctx.clearRect(0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                        this.state.strokes = []; // Clear temporary strokes
                        this.state.zoneImageLoaded = true; // Marque qu'une image de zone est affichée
                        ctx.drawImage(img, 0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                    };
                    img.src = list.zones[index];
                }
                
                // CORRECTION: Désactiver le mode zone automatiquement après affichage
                this.deactivateZoneMode();
            },

            activateZoneMode: function() {
                this.state.isZoneMode = true;
                this.elements.modeIndicator.innerText = "Mode: ZONES";
                this.elements.modeIndicator.style.background = "#ffcccc";
                this.elements.perfOverlay.classList.add('active');
                this.elements.perfCanvas.style.pointerEvents = 'none';

                document.body.classList.add('flash-border');
                setTimeout(() => {
                    document.body.classList.remove('flash-border');
                }, 1000);
            },
            // NOUVELLE FONCTION: Désactiver le mode zone
            deactivateZoneMode: function() {
                this.state.isZoneMode = false;
                this.elements.modeIndicator.innerText = "Mode: DESSIN";
                this.elements.modeIndicator.style.background = "#eee";
                this.elements.perfOverlay.classList.remove('active');
                this.elements.perfCanvas.style.pointerEvents = 'auto';
            },

            toggleColorPopup: function() {
                this.elements.colorPopup.classList.toggle('active');
            },

            selectColor: function(color, btn) {
                this.state.color = color;
                this.elements.currentColorIndicator.style.background = color;
                
                document.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                this.elements.colorPopup.classList.remove('active');
                
                this.state.isEraserMode = false;
                this.elements.eraserBtn.classList.remove('active');
            },

            toggleEraser: function() {
                this.state.isEraserMode = !this.state.isEraserMode;
                this.elements.eraserBtn.classList.toggle('active');
                
                if (this.state.isEraserMode) {
                    this.elements.colorPopup.classList.remove('active');
                }
            },

            setupDrawingMode: function(canvas, ctx, isPerformance = false) {
                let isDrawing = false;
                let pressTimer = null;
                let startX = 0;
                let startY = 0;
                let hasMoved = false;
                let currentStroke = null;

                const getCoords = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    if (e.touches && e.touches.length > 0) {
                        return {
                            x: e.touches[0].clientX - rect.left,
                            y: e.touches[0].clientY - rect.top                        };
                    }
                    return {
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top
                    };
                };

                const isPointNearStroke = (point, stroke, threshold = 15) => {
                    for (let i = 0; i < stroke.points.length - 1; i++) {
                        const p1 = stroke.points[i];
                        const p2 = stroke.points[i + 1];
                        const dist = pointToSegmentDistance(point.x, point.y, p1.x, p1.y, p2.x, p2.y);
                        if (dist < threshold) {
                            return true;
                        }
                    }
                    return false;
                };

                const pointToSegmentDistance = (px, py, x1, y1, x2, y2) => {
                    const A = px - x1;
                    const B = py - y1;
                    const C = x2 - x1;
                    const D = y2 - y1;

                    const dot = A * C + B * D;
                    const lenSq = C * C + D * D;
                    let param = -1;
                    
                    if (lenSq !== 0) param = dot / lenSq;

                    let xx, yy;

                    if (param < 0) {
                        xx = x1;
                        yy = y1;
                    } else if (param > 1) {
                        xx = x2;
                        yy = y2;
                    } else {
                        xx = x1 + param * C;
                        yy = y1 + param * D;
                    }

                    const dx = px - xx;
                    const dy = py - yy;
                    return Math.sqrt(dx * dx + dy * dy);
                };
                const startDraw = (e) => {
                    e.preventDefault();
                    isDrawing = true;
                    hasMoved = false;
                    const coords = getCoords(e);
                    startX = coords.x;
                    startY = coords.y;
                    
                    if (this.state.isEraserMode && isPerformance) {
                        for (let i = this.state.strokes.length - 1; i >= 0; i--) {
                            if (isPointNearStroke(coords, this.state.strokes[i])) {
                                this.state.strokes.splice(i, 1);
                                this.redrawAllStrokes(ctx);
                                isDrawing = false;
                                return;
                            }
                        }
                        isDrawing = false;
                        return;
                    }
                    
                    currentStroke = {
                        color: this.state.color,
                        points: [coords]
                    };
                    
                    ctx.beginPath();
                    ctx.moveTo(coords.x, coords.y);
                    ctx.lineWidth = 5;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = this.state.color;
                    
                    if (isPerformance) {
                        pressTimer = setTimeout(() => {
                            if (!hasMoved && isDrawing) {
                                this.activateZoneMode();
                            }
                        }, 700);
                    }
                };

                const draw = (e) => {
                    if (!isDrawing || !currentStroke) return;
                    e.preventDefault();
                    
                    const coords = getCoords(e);
                    const dist = Math.sqrt(Math.pow(coords.x - startX, 2) + Math.pow(coords.y - startY, 2));
                    if (dist > 10) {
                        hasMoved = true;
                        if (pressTimer) {                            clearTimeout(pressTimer);
                            pressTimer = null;
                        }
                    }

                    currentStroke.points.push(coords);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                };

                const endDraw = (e) => {
                    if (isDrawing && currentStroke && currentStroke.points.length > 0) {
                        this.state.strokes.push(currentStroke);
                    }
                    isDrawing = false;
                    currentStroke = null;
                    if (pressTimer) {
                        clearTimeout(pressTimer);
                        pressTimer = null;
                    }
                    ctx.beginPath();
                };

                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', endDraw);
                canvas.addEventListener('mouseleave', endDraw);

                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', endDraw);
                canvas.addEventListener('touchcancel', endDraw);
            },

            redrawAllStrokes: function(ctx) {
                ctx.clearRect(0, 0, this.elements.perfCanvas.width, this.elements.perfCanvas.height);
                
                // Si une image de zone est chargée, la redessiner d'abord
                if (this.state.zoneImageLoaded && this.state.currentListId) {
                    // L'image est déjà dans le canvas, on dessine juste les strokes par dessus
                }
                
                this.state.strokes.forEach(stroke => {
                    if (stroke.points.length < 2) return;
                    
                    ctx.beginPath();
                    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                    ctx.lineWidth = 5;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = stroke.color;                    
                    for (let i = 1; i < stroke.points.length; i++) {
                        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                    }
                    ctx.stroke();
                });
            },

            resizeCanvas: function(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            },
            
            clearCanvas: function(type) {
                if (confirm("Effacer tout le dessin ?")) {
                    const ctx = type === 'perf' ? this.elements.perfCtx : this.elements.editorCtx;
                    const canvas = type === 'perf' ? this.elements.perfCanvas : this.elements.editorCanvas;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (type === 'perf') {
                        this.state.strokes = [];
                        this.state.zoneImageLoaded = false;
                    }
                }
            }
        };

        window.onload = function() {
            app.init();
        };
    </script>
</body>
</html>
