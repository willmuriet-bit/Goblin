<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTEURS - VERSION FINALE</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #image-container {
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border: 5px solid #00ff00;
            background-color: #333;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .my-image {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
        }

        .my-image.show {
            opacity: 1;
            visibility: visible;
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;            width: 100%;
            max-width: 300px;
        }

        #btn-permission {
            background-color: #007bff;
            color: white;
        }

        .btn-a { background-color: #0066ff; color: white; }
        .btn-b { background-color: #00aa44; color: white; }
        .btn-c { background-color: #ff4444; color: white; }
        .btn-d { background-color: #ffcc00; color: black; }
        .btn-e { background-color: #aa44ff; color: white; }

        button:disabled {
            background-color: #555;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sensors {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .sensor-box {
            background-color: #333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }

        .sensor-value {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
        }

        .gamma { color: #ff6b6b; }
        .alpha { color: #4ecdc4; }

        #status {
            background-color: #1a4a1a;
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #status.locked {
            background-color: #4a1a1a;
            border-color: #ff0000;
        }

        .thresholds {
            background-color: #2a1a3a;
            border: 2px solid #aa00ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        #debug {
            background-color: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log { margin: 3px 0; }
        .ok { color: #00ff00; }
        .err { color: #ff0000; }
        .warn { color: #ffaa00; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">🎯 CAPTEURS</h2>

    <div id="status">👆 Clique "ACTIVER CAPTEURS"</div>

    <div class="thresholds">
        <strong>SEUILS:</strong><br>
        Gamma -15° → B | Gamma +15° → C<br>
        Alpha +20° → D | Alpha -20° → E
    </div>

    <button id="btn-permission" onclick="activate()">🔓 ACTIVER CAPTEURS</button>
    <div id="image-container">
        <img id="img-a" class="my-image show" src="https://picsum.photos/seed/fleur123/300/300">
        <img id="img-b" class="my-image" src="https://picsum.photos/seed/montagne456/300/300">
        <img id="img-c" class="my-image" src="https://picsum.photos/seed/ocean789/300/300">
        <img id="img-d" class="my-image" src="https://picsum.photos/seed/soleil111/300/300">
        <img id="img-e" class="my-image" src="https://picsum.photos/seed/lune222/300/300">
    </div>

    <div class="sensors">
        <div class="sensor-box">
            <div>GAMMA</div>
            <div id="gamma" class="sensor-value gamma">0°</div>
        </div>
        <div class="sensor-box">
            <div>ALPHA</div>
            <div id="alpha" class="sensor-value alpha">0°</div>
        </div>
    </div>

    <button class="btn-a" onclick="showImg('A')">🔵 A</button>
    <button class="btn-b" onclick="showImg('B')">🟢 B</button>
    <button class="btn-c" onclick="showImg('C')">🔴 C</button>
    <button class="btn-d" onclick="showImg('D')">🟡 D</button>
    <button class="btn-e" onclick="showImg('E')">🟣 E</button>

    <div id="debug"></div>

    <script>
        var locked = false;
        var ready = false;
        var gammaRef = 0;
        var alphaRef = 0;

        function log(msg, cls) {
            var d = document.getElementById('debug');
            var e = document.createElement('div');
            e.className = 'log ' + (cls || '');
            e.textContent = msg;
            d.insertBefore(e, d.firstChild);
        }

        function showImg(letter) {
            if (locked) {
                log('🔒 VERROUILLÉ!', 'err');
                return;
            }
            log('👤 Image: ' + letter, 'ok');
            
            // Cacher toutes les images
            document.getElementById('img-a').classList.remove('show');            document.getElementById('img-b').classList.remove('show');
            document.getElementById('img-c').classList.remove('show');
            document.getElementById('img-d').classList.remove('show');
            document.getElementById('img-e').classList.remove('show');
            
            // Afficher la bonne
            document.getElementById('img-' + letter.toLowerCase()).classList.add('show');
            
            // Verrouiller
            locked = true;
            document.getElementById('status').textContent = '🔒 VERROUILLÉ';
            document.getElementById('status').classList.add('locked');
            document.getElementById('btn-permission').style.display = 'none';
            
            var btns = document.querySelectorAll('button');
            for (var i = 0; i < btns.length; i++) {
                btns[i].disabled = true;
            }
            
            log('🔒 VERROUILLAGE ACTIVÉ', 'ok');
        }

        async function activate() {
            log('🔑 Permission...', 'warn');
            
            var granted = false;
            
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    var response = await DeviceOrientationEvent.requestPermission();
                    granted = (response === 'granted');
                } catch (e) {
                    log('❌ ' + e.message, 'err');
                    return;
                }
            } else {
                granted = true;
            }
            
            if (!granted) {
                log('❌ Permission refusée', 'err');
                return;
            }
            
            log('✅ Permission accordée', 'ok');
            document.getElementById('btn-permission').style.display = 'none';
            showImg('A');
            
            // Déverrouiller pour les capteurs après 4s            setTimeout(function() {
                locked = false;
                ready = true;
                document.getElementById('status').textContent = '🎯 BOUGE TON TÉLÉPHONE!';
                document.getElementById('status').classList.remove('locked');
                
                // Réactiver les boutons
                var btns = document.querySelectorAll('button');
                for (var i = 0; i < btns.length; i++) {
                    btns[i].disabled = false;
                }
                document.getElementById('btn-permission').style.display = 'block';
                
                log('✅ CAPTEURS ACTIFS!', 'ok');
            }, 4000);
            
            log('⏳ Attente 4s...', 'warn');
            
            // Écouteur capteurs
            window.addEventListener('deviceorientation', function(event) {
                if (!ready || locked) return;
                
                var gamma = event.gamma || 0;
                var alpha = event.alpha || 0;
                
                // Normaliser alpha
                if (alpha > 180) alpha = alpha - 360;
                
                // Afficher
                document.getElementById('gamma').textContent = Math.round(gamma) + '°';
                document.getElementById('alpha').textContent = Math.round(alpha) + '°';
                
                // Calcul relatif
                var gammaRel = gamma - gammaRef;
                var alphaRel = alpha - alphaRef;
                
                // Vérifier seuils
                var newImg = null;
                
                if (gammaRel < -15) {
                    newImg = 'B';
                    log('✅ Gamma -15° → B', 'ok');
                } else if (gammaRel > 15) {
                    newImg = 'C';
                    log('✅ Gamma +15° → C', 'ok');
                } else if (alphaRel > 20) {
                    newImg = 'D';
                    log('✅ Alpha +20° → D', 'ok');
                } else if (alphaRel < -20) {
                    newImg = 'E';                    log('✅ Alpha -20° → E', 'ok');
                }
                
                if (newImg) {
                    showImg(newImg);
                }
            });
            
            log('✅ Écouteur activé', 'ok');
        }

        log('📱 Page chargée', 'warn');
    </script>
</body>
</html>
