<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Capteurs</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #image-container {
            width: 280px;
            height: 280px;
            border-radius: 15px;
            overflow: hidden;
            background-color: #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        img.active {
            display: block;
        }

        #permission-btn {
            /* MODIFICATIONS IMPORTANTES POUR RENDRE LE BOUTON CLIQUABLE */
            position: relative;
            z-index: 9999;
            pointer-events: auto !important;
                        padding: 20px 40px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #permission-btn:active {
            background-color: #0056b3;
            transform: scale(0.95);
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            background-color: #333;
            border-radius: 10px;
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        #debug {
            margin-top: 10px;
            font-size: 12px;
            color: #00ff00;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="image-container">
        <img id="img-a" src="https://picsum.photos/300/300?random=1" class="active">
        <img id="img-b" src="https://picsum.photos/300/300?random=2">
        <img id="img-c" src="https://picsum.photos/300/300?random=3">
    </div>

    <button id="permission-btn">🔓 ACTIVER LES CAPTEURS</button>
    
    <div id="status">
        <div>Statut: En attente...</div>
        <div id="debug">Alpha: - | Beta: - | Gamma: -</div>
    </div>
    <script>
        console.log("📱 Script chargé avec succès!");
        
        const btn = document.getElementById('permission-btn');
        const statusDiv = document.querySelector('#status div');
        const debugDiv = document.getElementById('debug');
        
        const imgA = document.getElementById('img-a');
        const imgB = document.getElementById('img-b');
        const imgC = document.getElementById('img-c');

        // TEST 1: Vérifier si le bouton existe
        console.log("Bouton trouvé:", btn);

        // TEST 2: Ajouter un écouteur d'événement
        btn.addEventListener('click', function(e) {
            console.log("✅ BOUTON CLIQUÉ!");
            e.preventDefault();
            e.stopPropagation();
            
            statusDiv.textContent = "🔄 Demande de permission...";
            statusDiv.style.color = "#ffff00";
            
            requestPermission();
        });

        // Empêcher le comportement par défaut sur tactile
        btn.addEventListener('touchstart', function(e) {
            console.log("👆 Touch start détecté");
        });

        async function requestPermission() {
            console.log("🔑 Fonction requestPermission appelée");
            
            // Vérifier si l'API existe
            if (typeof DeviceOrientationEvent !== 'undefined') {
                console.log("✅ DeviceOrientationEvent disponible");
                
                // iOS 13+
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    console.log("📱 iOS détecté - demande de permission");
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        console.log("Permission réponse:", permission);
                        
                        if (permission === 'granted') {
                            console.log("✅ Permission accordée!");
                            startSensors();
                        } else {                            console.log("❌ Permission refusée");
                            statusDiv.textContent = "❌ Permission refusée";
                            statusDiv.style.color = "#ff0000";
                        }
                    } catch (error) {
                        console.error("Erreur:", error);
                        statusDiv.textContent = "❌ Erreur: " + error.message;
                        statusDiv.style.color = "#ff0000";
                    }
                } else {
                    // Android
                    console.log("🤖 Android détecté - pas de permission nécessaire");
                    startSensors();
                }
            } else {
                console.log("❌ DeviceOrientationEvent NON disponible");
                statusDiv.textContent = "❌ Capteurs non supportés";
                statusDiv.style.color = "#ff0000";
            }
        }

        function startSensors() {
            console.log("🎯 Démarrage des capteurs...");
            statusDiv.textContent = "✅ Capteurs actifs!";
            statusDiv.style.color = "#00ff00";
            btn.style.display = 'none';
            
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            const alpha = event.alpha || 0;
            const beta = event.beta || 0;
            const gamma = event.gamma || 0;
            
            debugDiv.textContent = `Alpha: ${Math.round(alpha)}° | Beta: ${Math.round(beta)}° | Gamma: ${Math.round(gamma)}°`;
            
            // Si téléphone à plat
            if (Math.abs(beta) < 30 && Math.abs(gamma) < 30) {
                let normalizedAlpha = alpha;
                if (normalizedAlpha > 180) normalizedAlpha -= 360;
                
                if (normalizedAlpha > -45 && normalizedAlpha < 45) {
                    showImage('A');
                } else if (normalizedAlpha <= -45) {
                    showImage('B');
                } else if (normalizedAlpha >= 45) {
                    showImage('C');
                }
            }        }

        function showImage(letter) {
            imgA.classList.remove('active');
            imgB.classList.remove('active');
            imgC.classList.remove('active');
            
            if (letter === 'A') imgA.classList.add('active');
            if (letter === 'B') imgB.classList.add('active');
            if (letter === 'C') imgC.classList.add('active');
        }
    </script>
</body>
</html>
